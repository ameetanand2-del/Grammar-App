"Example: She had no qualifications. Nevertheless, her experience proved invaluable.",
"Similar: Nonetheless (synonym), However (less formal), Still (most informal).",
"",
"5. WHEREAS — Direct factual contrast",
"Meaning: compares two things that are different. Introduces a subordinate clause.",
"Position: Mid-sentence or start of clause.",
"Example: Western medicine treats symptoms, whereas traditional medicine addresses root causes.",
"Similar: While (less formal), In contrast (starts new sentence).",
"",
"6. ON THE CONTRARY — Direct negation",
"Meaning: emphasises that the OPPOSITE is true. Stronger than However.",
"Position: Start of sentence.",
"Example: The task was not simple. On the contrary, it required extensive expertise.",
"Similar: In fact, Rather, Instead.",
"'On the contrary' directly CONTRADICTS. 'In fact' can contradict OR reinforce.",
"",
"THE KEY GRAMMAR TRAPS IN PTE",
"TRAP 1: Despite vs Although",
"Despite + NOUN/GERUND: Despite the rain / Despite feeling nervous",
"Although + FULL CLAUSE: Although it rained / Although she felt nervous",
"NEVER: Despite it rained ✗ | Although the rain ✗",
"",
"TRAP 2: However vs Although — position matters",
"However starts a NEW sentence: 'It rained. However, they played.'",
"Although starts a SUBORDINATE clause: 'Although it rained, they played.'",
"NEVER: However it rained, they played ✗",
"",
"TRAP 3: Whereas vs However",
"Whereas = inside ONE sentence comparing two things side by side",
"However = between TWO separate sentences showing contrast",
"'Urban areas grow, whereas rural areas shrink.' (one sentence, two subjects)",
"'Urban areas grow. However, rural areas shrink.' (two sentences)"
],
trap:{w:"Despite it was raining, the match continued.",r:"Despite the rain, the match continued. / Although it was raining, the match continued.",y:"Despite takes NOUN/GERUND, not a full clause. Use Although for full clauses."}},

"cn-addition":{title:"Addition Connectors 🆕",rule:"Addition connectors add information that supports or extends the previous point. Moreover/Furthermore are formal and start new sentences. In addition works as an adverb (start of sentence) or 'In addition to' as a preposition (+noun). Also goes MID-sentence (before main verb). Besides is slightly informal and can mean 'in addition to' or 'moreover'.",pos:"Moreover/Furthermore = start new sentence + comma | In addition = start sentence OR 'In addition to' + noun | Also = mid-sentence before main verb | Besides = start sentence OR before noun",
exs:["The plan is cost-effective. Moreover, it can be implemented immediately.","The research was thorough. Furthermore, it was peer-reviewed.","In addition, the company offers flexible hours.","In addition to his salary, he receives bonuses.","She is a skilled writer. She also speaks three languages.","Besides the cost, there are logistical challenges."],
notes:[
"ADDITION CONNECTORS — THE FULL FAMILY",
"There are 5 main addition connectors you must know for PTE. They all ADD information but differ in formality and position.",
"",
"1. MOREOVER — Formal addition, strengthens the previous point",
"Meaning: adds information that supports or strengthens what came before.",
"Position: Start of new sentence + comma. Formal and academic.",
"Example: The city offers excellent transport. Moreover, cycling infrastructure has expanded.",
"Similar: Furthermore, In addition, Besides.",
"'Moreover' and 'Furthermore' are interchangeable in most cases.",
"",
"2. FURTHERMORE — Formal, cumulative argument builder",
"Meaning: adds another point that builds on what was said. Often used when listing multiple arguments.",
"Position: Start of new sentence + comma. Very common in academic writing.",
"Example: The defendant had no alibi. Furthermore, forensic evidence placed him at the scene.",
"Similar: Moreover, Additionally, What is more.",
"'Furthermore' often appears when building a cumulative case — point after point.",
"",
"3. IN ADDITION — Flexible addition connector",
"Meaning: introduces extra information or an additional point.",
"TWO FORMS — this is the key PTE trap:",
"'In addition' alone = adverb → starts a new sentence + comma.",
"'In addition to' + noun/gerund = preposition phrase.",
"Example (adverb): The scholarship covers fees. In addition, it provides a living allowance.",
"Example (preposition): In addition to reducing costs, the system improved security.",
"CRITICAL: 'In addition to' + NOUN/GERUND, never a full clause.",
"Similar: Moreover, Besides, As well as.",
"",
"4. ALSO — The most common and flexible",
"Meaning: adds information. The most informal and versatile addition word.",
"Position: MID-SENTENCE — before main verb, after be/auxiliary verb.",
"Example: She also speaks three languages. / The hotel also provides airport transfers.",
"NOT at the start of a sentence in formal writing.",
"Similar: Too (end of sentence), As well (end), Likewise (formal).",
"",
"5. BESIDES — Informal addition or afterthought",
"Meaning: in addition to / apart from. Often adds an extra argument.",
"TWO FORMS:",
"'Besides' + noun = preposition meaning 'in addition to'.",
"'Besides' alone = adverb meaning 'moreover' (start of sentence).",
"Example (prep): Besides the cost, there are logistical challenges.",
"Example (adverb): The food is great. Besides, the service is excellent.",
"Similar: Moreover, In addition, Apart from.",
"",
"THE KEY GRAMMAR TRAPS IN PTE",
"TRAP 1: Moreover vs However — direction matters!",
"Moreover = SAME direction. Both points are positive or both negative.",
"However = OPPOSITE direction. Second point contrasts the first.",
"'The plan saves money. Moreover, it saves time.' (both positive = Moreover ✓)",
"'The plan saves money. However, it takes longer.' (positive then negative = However ✓)",
"",
"TRAP 2: In addition vs In addition to",
"'In addition' = starts new sentence. 'In addition, the company offers...'",
"'In addition to' + noun/gerund = mid-sentence. 'In addition to his salary, he receives...'",
"NEVER: 'In addition to he earns well' ✗ — needs noun not clause.",
"",
"TRAP 3: Also — position matters!",
"BEFORE main verb: 'She also speaks French.'",
"AFTER be-verb: 'He is also a talented musician.'",
"AFTER auxiliary: 'They have also completed the project.'",
"NOT at start: 'Also, she speaks French.' ✗ (too informal for PTE)",
"",
"TRAP 4: Moreover vs Furthermore — when to use which?",
"They are almost identical. BUT:",
"Moreover = adds a STRONGER or more impressive point.",
"Furthermore = adds another point in a CUMULATIVE list.",
"In practice for PTE: either works. Don't overthink this one."
],
trap:{w:"In addition to he earned a good salary, he received bonuses.",r:"In addition to his good salary, he received bonuses.",y:"'In addition to' is a preposition — must be followed by noun/gerund, not a full clause."}},

"cn-cause":{title:"Cause & Effect Connectors 🆕",rule:"Cause & Effect connectors show that one thing leads to another. Therefore/Consequently/Hence/Thus show RESULTS and start new sentences. As a result is the most conversational. Hence is the most formal. Due to/Because of/Owing to are PREPOSITIONS followed by nouns. Since/Because/As are CONJUNCTIONS followed by full clauses.",pos:"Therefore/Consequently/Hence = start new sentence + comma | As a result = start sentence + comma | Due to/Because of = before noun/gerund | Since/Because = before full clause",
exs:["The evidence was conclusive. Therefore, the committee approved the proposal.","He neglected his health. Consequently, he fell seriously ill.","The region lacks rainfall; hence, irrigation is essential.","Global temperatures have risen. As a result, ice sheets are melting.","The match was postponed due to heavy rain.","Since you are already here, you might as well stay."],
notes:[
"CAUSE & EFFECT CONNECTORS — THE FULL FAMILY",
"There are 6 main cause & effect connectors for PTE. They all show that one thing CAUSED another.",
"",
"1. THEREFORE — Logical result or conclusion",
"Meaning: introduces a logical result that follows from what was stated.",
"Position: Start of new sentence + comma. Or mid-sentence with semicolons.",
"Example: The population is ageing. Therefore, demand for healthcare is expected to rise.",
"Similar: Consequently, Hence, As a result.",
"'Therefore' is the most versatile and common of the group.",
"",
"2. CONSEQUENTLY — Emphasises the consequence",
"Meaning: as a result of something. Emphasises that the second event is a DIRECT consequence.",
"Position: Start of new sentence + comma.",
"Example: The factory closed. Consequently, hundreds of workers lost their jobs.",
"Similar: Therefore, As a result, Thus.",
"'Consequently' STRONGLY emphasises the cause-effect relationship.",
"",
"3. HENCE — Very formal, academic",
"Meaning: for this reason. Very formal, used in academic and legal contexts.",
"Position: Start of sentence or mid-sentence. Comma optional but common.",
"Example: The sample size was too small; hence, the results cannot be generalised.",
"Similar: Therefore, Thus, Accordingly.",
"'Hence' is the MOST FORMAL and can sound old-fashioned in casual writing.",
"NOTE: 'Hence' can also mean 'from now' — 'two years hence' = two years from now.",
"",
"4. AS A RESULT — Neutral and conversational",
"Meaning: shows that something is a consequence or outcome.",
"Position: Start of new sentence + comma.",
"Example: She trained rigorously. As a result, she won the competition.",
"Similar: Consequently, Therefore, Because of this.",
"'As a result' is the most conversational. 'Because of this' is even more informal.",
"",
"5. DUE TO — Preposition showing cause",
"Meaning: because of. A preposition phrase.",
"Position: Before noun or gerund. Mid-sentence or start.",
"Example: The match was postponed due to heavy rain.",
"CRITICAL: Due to + NOUN/GERUND. Never a full clause.",
"'Due to the rain' ✓ | 'Due to it rained' ✗",
"Similar: Because of (interchangeable), Owing to (more formal).",
"Traditionally 'due to' modifies nouns and 'because of' modifies verbs — but modern usage treats them the same.",
"",
"6. SINCE — Known reason (conjunction)",
"Meaning: because / given that. Introduces a reason that is ALREADY KNOWN.",
"Position: Start of subordinate clause.",
"Example: Since the data supports this hypothesis, further testing may not be needed.",
"CRITICAL: Since + FULL CLAUSE. It is a conjunction.",
"Similar: Because (stronger, introduces NEW reasons), As (weaker, formal), Given that (most formal).",
"WARNING: 'Since' also means 'from that time' — Since 2020, the economy has changed.",
"Context tells you which meaning: TIME since or REASON since.",
"",
"THE KEY GRAMMAR TRAPS IN PTE",
"TRAP 1: Due to vs Because — noun vs clause",
"Due to + NOUN: 'The delay was due to bad weather.'",
"Because + CLAUSE: 'The delay happened because the weather was bad.'",
"NEVER: 'Due to the weather was bad' ✗",
"NEVER: 'Because bad weather' ✗ (needs a clause)",
"",
"TRAP 2: Therefore vs However — direction matters!",
"Therefore = SAME DIRECTION. Cause leads to logical result.",
"However = OPPOSITE DIRECTION. Second point contrasts the first.",
"'It rained heavily. Therefore, the match was cancelled.' (rain → cancellation = logical)",
"'It rained heavily. However, the match continued.' (rain BUT match continued = contrast)",
"",
"TRAP 3: Since vs Because — known vs new reason",
"Since = the reason is ALREADY KNOWN or obvious.",
"Because = introducing a NEW or specific reason.",
"'Since you already know the rules, let us begin.' (known fact)",
"'The project failed because the budget was cut.' (new information explaining why)",
"",
"TRAP 4: Cause-effect vs Addition — tricky in PTE!",
"'The drug is effective. Moreover, it has no side effects.' (addition — two separate good points)",
"'The drug is effective. Consequently, sales have increased.' (cause-effect — effectiveness CAUSED sales)",
"Ask: did point A CAUSE point B? YES → cause-effect. NO → probably addition.",
"",
"TRAP 5: As a result vs Despite — opposite meanings!",
"'It rained. As a result, the match was cancelled.' (rain CAUSED cancellation)",
"'It rained. Despite this, the match continued.' (rain did NOT cause cancellation)",
"Read carefully whether the result is EXPECTED or UNEXPECTED."
],
trap:{w:"Due to it was raining heavily, the match was cancelled.",r:"Due to the heavy rain, the match was cancelled. / Because it was raining heavily, the match was cancelled.",y:"Due to takes NOUN/GERUND, not a full clause. Use Because for full clauses."}},

"cn-sequence":{title:"Sequence Connectors 🆕",rule:"Sequence connectors organise ideas in order. Firstly/Secondly/Finally structure numbered arguments. Subsequently/Afterwards/Later show what happened NEXT in time. Meanwhile shows PARALLEL events happening at the same time. In conclusion/To summarise signal the FINAL summary.",pos:"Firstly/Secondly/Finally = start sentence + comma | Subsequently = start sentence or mid-sentence | Meanwhile = start sentence + comma | In conclusion = start sentence + comma",
exs:["Firstly, we need to assess the current situation.","He graduated in 2020 and subsequently moved to London.","After months of deliberation, the committee finally reached a decision.","She prepared dinner. Meanwhile, the children played outside.","In conclusion, the evidence strongly supports the proposed policy."],
notes:[
"SEQUENCE CONNECTORS — THE FULL FAMILY",
"There are 5 main sequence connectors for PTE. They organise ideas in TIME ORDER or ARGUMENT ORDER.",
"",
"1. FIRSTLY — Starts a numbered sequence",
"Meaning: introduces the first point in a list or argument.",
"Position: Start of sentence + comma. Sets up expectation that more points follow.",
"Example: Firstly, the government must address root causes of poverty.",
"Similar: First, First of all, To begin with.",
"'Firstly' is slightly more formal than 'First'. 'First of all' is conversational.",
"IMPORTANT: If you use Firstly, follow with Secondly, Thirdly, Finally — keep the sequence consistent.",
"",
"2. SUBSEQUENTLY — What happened next (formal)",
"Meaning: after a particular event or time. Shows something happened LATER in a sequence.",
"Position: Start of sentence + comma. Or mid-sentence.",
"Example: The proposal was reviewed and subsequently approved by the board.",
"Similar: Afterwards (neutral), Later (casual), Then (most casual).",
"'Subsequently' is FORMAL — used in academic and professional writing.",
"",
"3. FINALLY — Last in series OR after a long time",
"Meaning: TWO uses — last point in a list, OR something happening after a long wait.",
"Position: Start of sentence + comma. Or mid-sentence.",
"Example (last point): Finally, we must consider the environmental impact.",
"Example (long wait): After years of negotiations, the countries finally signed a peace agreement.",
"Similar: Lastly (only for last item), In conclusion (wrapping up), Ultimately (end result).",
"'Finally' works for BOTH sequences and conclusions. 'Lastly' is ONLY for the last item in a list.",
"",
"4. MEANWHILE — Parallel events at the same time",
"Meaning: at the same time as something else is happening.",
"Position: Start of sentence + comma.",
"Example: Scientists worked on a vaccine. Meanwhile, governments imposed lockdowns.",
"Similar: In the meantime (suggests waiting), At the same time (literal), Simultaneously (formal).",
"'Meanwhile' is the most common. Use it when TWO things happen at the SAME TIME.",
"",
"5. IN CONCLUSION — Final summary",
"Meaning: signals the closing remarks or final summary of an argument or essay.",
"Position: Start of sentence + comma.",
"Example: In conclusion, the benefits of renewable energy far outweigh the initial costs.",
"Similar: To summarise, All in all (informal), In summary.",
"'In conclusion' is the most formal and expected in PTE essays and academic writing.",
"",
"THE KEY GRAMMAR TRAPS IN PTE",
"TRAP 1: Finally vs In conclusion — subtle difference",
"Finally = last item in a numbered list (Firstly... Secondly... Finally...)",
"In conclusion = wrapping up an entire ARGUMENT or ESSAY with a summary.",
"Both can end a piece of writing but serve different purposes.",
"'Finally, the third reason is...' (last in list) vs 'In conclusion, the evidence shows...' (summary).",
"",
"TRAP 2: Subsequently vs Consequently — time vs cause!",
"Subsequently = what happened NEXT in TIME. No cause implied.",
"Consequently = what happened as a RESULT. Direct cause implied.",
"'He graduated and subsequently moved to London.' (time sequence — graduation didn't cause the move)",
"'He lost his job. Consequently, he moved to London.' (cause — job loss caused the move)",
"This is one of PTE's FAVOURITE traps. Ask: did A cause B or just happen before B?",
"",
"TRAP 3: Meanwhile vs However — parallel vs contrast",
"Meanwhile = two things happening AT THE SAME TIME. No opposition.",
"However = two things in CONTRAST or opposition.",
"'She cooked dinner. Meanwhile, the kids played.' (same time, no conflict)",
"'She cooked dinner. However, the kids refused to eat.' (contrast — effort vs refusal)",
"",
"TRAP 4: Firstly vs First — consistency matters",
"If you start with 'Firstly', continue with 'Secondly', 'Thirdly', 'Finally'.",
"If you start with 'First', continue with 'Second', 'Third', 'Last'.",
"DON'T MIX: 'Firstly... Second... Finally' ✗",
"",
"TRAP 5: Finally — two meanings, one word",
"Meaning 1: LAST IN SEQUENCE — 'Finally, the third benefit is...'",
"Meaning 2: AFTER A LONG TIME — 'They finally agreed after years of debate.'",
"Position helps: Start of sentence = usually last in sequence. Mid-sentence = usually after long time."
],
trap:{w:"The site was discovered accidentally. Consequently, a full excavation was organised.",r:"The site was discovered accidentally. Subsequently, a full excavation was organised.",y:"The discovery didn't CAUSE the excavation in a logical sense — the excavation just happened NEXT in time. Subsequently = time sequence. Consequently = cause-effect."}}

}}};

{id:"L1pg10",ty:"dg",tid:"ptegrammar",sid:"pg-parallel",p:"Contemporary research continues _B1_ and testing the hierarchical boundaries and _B2_ their real-world implications.",bl:["examining","exploring"],bk:["examining","to examine","exploring","to explore","examined","explored","examine","explore"],x:"continues examining(-ING) and testing(-ING) and exploring(-ING). All -ING after continues.",r:"AND -ING mirror throughout."},

{id:"L1pg11",ty:"dd",tid:"ptegrammar",sid:"pg-wordtype",p:"Impressionist characteristics include visible brushstrokes, light colours, and ___1___ on natural light.",b:[{id:"b1",o:["emphasize","emphasizing","emphasis","emphatic"],c:2,l:"___1___"}],x:{b1:"List of nouns: brushstrokes, colours → emphasis (noun)."},r:"Noun list → noun form."},
{id:"L1pg12",ty:"dd",tid:"ptegrammar",sid:"pg-wordtype",p:"The programme recommended increasing funding, ___1___ existing staff, and recruiting specialists.",b:[{id:"b1",o:["evaluation","evaluate","evaluated","evaluating"],c:3,l:"___1___"}],x:{b1:"increasing(-ING), recruiting(-ING) → evaluating(-ING)."},r:"-ING list → -ING form."},
{id:"L1pg13",ty:"dg",tid:"ptegrammar",sid:"pg-wordtype",p:"Key success factors included strong leadership, clear _B1_, and consistent execution.",bl:["communication"],bk:["communication","communicating","communicated","communicative","communicate","communicated","communicates","to communicate"],x:"leadership(noun), execution(noun) → communication(noun).",r:"Noun list → noun."},
{id:"L1pg14",ty:"dd",tid:"ptegrammar",sid:"pg-wordtype",p:"The painting is known for its rich colours, dynamic ___1___, and unusual visual angles.",b:[{id:"b1",o:["compose","composing","compositional","composition"],c:3,l:"___1___"}],x:{b1:"colours(noun), angles(noun) → composition(noun)."},r:"Noun list → noun."},
{id:"L1pg15",ty:"dg",tid:"ptegrammar",sid:"pg-wordtype",p:"The policy aims to reduce waste, _B1_ sustainability, and improve working conditions.",bl:["promote"],bk:["promote","promoting","promotion","promoted","promotes","to promoting","promoter","promotional"],x:"to reduce(TO), to improve(TO) → to promote(TO base).",r:"TO+base list → base verb."},
// Real vs Hypothetical (5)
{id:"L1pg16",ty:"dd",tid:"ptegrammar",sid:"pg-hypothetical",p:"The treatment reduced pain far more quickly than ___1___ expected for a standard dose.",b:[{id:"b1",o:["is","being","would be","was"],c:2,l:"___1___"}],x:{b1:"Comparing real result to imagined prediction = WOULD BE expected."},r:"Prediction comparison = WOULD BE."},
{id:"L1pg17",ty:"dd",tid:"ptegrammar",sid:"pg-hypothetical",p:"The results ___1___ surprising. The outcome ___2___ greater than would be anticipated.",b:[{id:"b1",o:["would be","were","being","would been"],c:1,l:"___1___"},{id:"b2",o:["would be","is","being","was"],c:3,l:"___2___"}],x:{b1:"Real past event = WERE.",b2:"Comparing to prediction = WAS (already happened = real past)."},r:"Real event=WAS. Comparison=WAS."},
{id:"L1pg18",ty:"dg",tid:"ptegrammar",sid:"pg-hypothetical",p:"Without intervention, the damage _B1_ far greater than _B2_ expected given the scale.",bl:["would be","would be"],bk:["would be","was","is","being","were","will be","has been","had been"],x:"Imaginary scenario(no intervention) = WOULD BE. Prediction comparison = WOULD BE.",r:"Hypothetical = WOULD BE."},
{id:"L1pg19",ty:"dd",tid:"ptegrammar",sid:"pg-hypothetical",p:"The surgery produced better outcomes than ___1___ anticipated. The recovery time ___2___ shorter than predicted.",b:[{id:"b1",o:["is","being","would be","was"],c:2,l:"___1___"},{id:"b2",o:["would be","is","was","being"],c:2,l:"___2___"}],x:{b1:"Comparing to anticipated prediction = WOULD BE.",b2:"Also comparing to prediction = WOULD BE."},r:"Both = prediction comparisons = WOULD BE."},
{id:"L1pg20",ty:"dg",tid:"ptegrammar",sid:"pg-hypothetical",p:"The company's profits _B1_ higher if costs had been controlled. The actual result _B2_ disappointing.",bl:["would be","was"],bk:["would be","was","is","being","were","will be","would been","been"],x:"Hypothetical: if costs controlled = WOULD BE. Real actual result = WAS.",r:"Hypothetical=WOULD BE. Real=WAS."},
// OTHER vs THEIR (5)
{id:"L1pg21",ty:"dd",tid:"ptegrammar",sid:"pg-othertheir",p:"Some nations pursue independent policies rather than aligning with ___1___ countries. They filed ___2___ report separately.",b:[{id:"b1",o:["their","other","others","another"],c:1,l:"___1___"},{id:"b2",o:["other","their","another","others"],c:1,l:"___2___"}],x:{b1:"Different/separate countries = OTHER.",b2:"Report belonging to them = THEIR."},r:"Different=OTHER. Belonging=THEIR."},
{id:"L1pg22",ty:"dd",tid:"ptegrammar",sid:"pg-othertheir",p:"The research team published ___1___ findings. While some companies focus on profit, ___2___ organisations prioritise social value.",b:[{id:"b1",o:["other","their","another","others"],c:1,l:"___1___"},{id:"b2",o:["their","other","theirs","another"],c:1,l:"___2___"}],x:{b1:"Findings belong to team = THEIR.",b2:"Different/separate organisations = OTHER."},r:"Belonging=THEIR. Separate=OTHER."},
{id:"L1pg23",ty:"dg",tid:"ptegrammar",sid:"pg-othertheir",p:"Some languages rely on tonal distinctions while _B1_ rely on word order. Each language has _B2_ own unique structure.",bl:["others","its"],bk:["others","their","other","its","it","theirs","another","they"],x:"Others = different separate ones (pronoun). Its = belonging to each language (singular possession).",r:"Separate ones=OTHERS. Singular belonging=ITS."},
{id:"L1pg24",ty:"dd",tid:"ptegrammar",sid:"pg-othertheir",p:"Some countries find it convenient to not recognise ___1___ countries. They maintain ___2___ own foreign policy.",b:[{id:"b1",o:["their","other","theirs","another"],c:1,l:"___1___"},{id:"b2",o:["other","their","another","others"],c:1,l:"___2___"}],x:{b1:"Different/separate countries = OTHER.",b2:"Policy belonging to them = THEIR."},r:"Separate=OTHER. Belonging=THEIR."},
{id:"L1pg25",ty:"dg",tid:"ptegrammar",sid:"pg-othertheir",p:"While some researchers focus on theory, _B1_ prioritise field work. Each group values _B2_ contribution.",bl:["others","their"],bk:["other","others","their","theirs","its","they","another","them"],x:"Others = different separate researchers (pronoun). Their = contribution belonging to each group.",r:"Separate=OTHERS. Belonging=THEIR."},
// CONNECTORS: CONTRAST (15) 🆕
{id:"L1cn01",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"The experiment was costly. ___1___, it yielded valuable results.",b:[{id:"b1",o:["However","Moreover","Therefore","Although"],c:0,l:"___1___"}],x:{b1:"Contrast — positive result despite high cost = However."},r:"However = contrast between two sentences."},
{id:"L1cn02",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"___1___ the rain, the outdoor concert went ahead as planned.",b:[{id:"b1",o:["Despite","Although","However","Because of"],c:0,l:"___1___"}],x:{b1:"'the rain' = noun. Despite + noun. Although needs a clause."},r:"Despite + noun. Although + clause."},
{id:"L1cn03",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"___1___ it was late, she decided to finish the report.",b:[{id:"b1",o:["Although","Despite","However","Moreover"],c:0,l:"___1___"}],x:{b1:"'it was late' = full clause. Although + clause."},r:"Although + full clause."},
{id:"L1cn04",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"The team worked overtime. ___1___, the deadline was still missed.",b:[{id:"b1",o:["Nevertheless","Therefore","Moreover","Since"],c:0,l:"___1___"}],x:{b1:"Unexpected contrast — effort didn't prevent bad outcome."},r:"Nevertheless = persistence didn't help."},
{id:"L1cn05",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"Urban areas offer more jobs, ___1___ rural areas provide a better quality of life.",b:[{id:"b1",o:["whereas","moreover","therefore","despite"],c:0,l:"___1___"}],x:{b1:"Direct contrast between urban vs rural within ONE sentence."},r:"Whereas = side-by-side contrast."},
{id:"L1cn06",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"He is not lazy. ___1___, he works harder than anyone.",b:[{id:"b1",o:["On the contrary","However","Moreover","Therefore"],c:0,l:"___1___"}],x:{b1:"Directly negating the previous claim — opposite is true."},r:"On the contrary = direct negation."},
{id:"L1cn07",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"The medicine reduced symptoms. ___1___, it had some side effects.",b:[{id:"b1",o:["However","Therefore","Moreover","Since"],c:0,l:"___1___"}],x:{b1:"Contrast — good effect BUT bad side effects."},r:"However for contrasting outcomes."},
{id:"L1cn08",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"___1___ having no formal training in finance, she built a successful portfolio.",b:[{id:"b1",o:["Despite","Although","However","Since"],c:0,l:"___1___"}],x:{b1:"'having' = gerund. Despite + gerund."},r:"Despite + gerund. Not Although here."},
{id:"L1cn09",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"The government invested heavily in renewable energy. ___1___, the country still depends on fossil fuels for sixty percent of its needs.",b:[{id:"b1",o:["Nevertheless","Therefore","Furthermore","Since"],c:0,l:"___1___"}],x:{b1:"Dependency continues despite investment — formal contrast."},r:"Nevertheless = formal 'even so'."},
{id:"L1cn10",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"Western medicine focuses on treating symptoms, ___1___ traditional medicine often addresses root causes.",b:[{id:"b1",o:["whereas","however","therefore","despite"],c:0,l:"___1___"}],x:{b1:"Two approaches compared side by side in ONE sentence."},r:"Whereas = direct comparison."},
{id:"L1cn11",ty:"dg",tid:"connectors",sid:"cn-contrast",p:"_B1_ the evidence was compelling, the jury remained divided. The policy did not help. _B2_, it made things worse.",bl:["Although","On the contrary"],bk:["Although","Despite","However","On the contrary","Nevertheless","Moreover","Therefore","Whereas"],x:"Clause follows = Although. Direct negation = On the contrary.",r:"Although + clause. On the contrary = negates."},
{id:"L1cn12",ty:"dg",tid:"connectors",sid:"cn-contrast",p:"_B1_ widespread opposition, the government pushed ahead. The plan was risky; _B2_, it paid off.",bl:["Despite","nevertheless"],bk:["Despite","Although","However","Nevertheless","Moreover","Therefore","Whereas","On the contrary"],x:"'opposition' = noun → Despite. Semicolon + contrast = nevertheless.",r:"Despite + noun. Nevertheless after semicolon."},
{id:"L1cn13",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"Private schools can select students, ___1___ public schools must accept all applicants.",b:[{id:"b1",o:["whereas","moreover","therefore","despite"],c:0,l:"___1___"}],x:{b1:"Two systems compared within one sentence."},r:"Whereas for factual side-by-side contrast."},
{id:"L1cn14",ty:"dd",tid:"connectors",sid:"cn-contrast",p:"The software was designed to improve security. ___1___, it introduced new vulnerabilities.",b:[{id:"b1",o:["However","Moreover","Therefore","Furthermore"],c:0,l:"___1___"}],x:{b1:"Intended improvement vs actual negative outcome = contrast."},r:"However between two separate sentences."},
{id:"L1cn15",ty:"dg",tid:"connectors",sid:"cn-contrast",p:"_B1_ the two approaches differ in methodology, they arrive at similar conclusions. The task was not simple. _B2_, it required extensive expertise.",bl:["Although","On the contrary"],bk:["Although","Despite","However","On the contrary","Nevertheless","Moreover","Whereas","Therefore"],x:"'the two approaches differ' = full clause → Although. Negating 'not simple' = On the contrary.",r:"Although + clause. On the contrary negates."},
// CONNECTORS: ADDITION (15) 🆕
{id:"L1cn16",ty:"dd",tid:"connectors",sid:"cn-addition",p:"The plan is cost-effective. ___1___, it can be implemented immediately.",b:[{id:"b1",o:["Moreover","However","Therefore","Although"],c:0,l:"___1___"}],x:{b1:"Adding a second positive point — no contrast needed."},r:"Moreover = adds a supporting point."},
{id:"L1cn17",ty:"dd",tid:"connectors",sid:"cn-addition",p:"The research was thorough. ___1___, it was peer-reviewed.",b:[{id:"b1",o:["Furthermore","However","Consequently","Nevertheless"],c:0,l:"___1___"}],x:{b1:"Building cumulative case — thorough AND peer-reviewed."},r:"Furthermore = cumulative addition."},
{id:"L1cn18",ty:"dd",tid:"connectors",sid:"cn-addition",p:"___1___, the company offers flexible working hours.",b:[{id:"b1",o:["In addition","Despite","However","Although"],c:0,l:"___1___"}],x:{b1:"Adding extra info at start of new sentence = In addition."},r:"In addition = adverb, starts sentence."},
{id:"L1cn19",ty:"dd",tid:"connectors",sid:"cn-addition",p:"___1___ his salary, he receives performance bonuses.",b:[{id:"b1",o:["In addition to","In addition","Moreover","Furthermore"],c:0,l:"___1___"}],x:{b1:"'his salary' = noun. 'In addition to' + noun = preposition."},r:"In addition to + noun."},
{id:"L1cn20",ty:"dd",tid:"connectors",sid:"cn-addition",p:"She is a skilled writer. She ___1___ speaks three languages.",b:[{id:"b1",o:["also","however","therefore","nevertheless"],c:0,l:"___1___"}],x:{b1:"Adding another skill mid-sentence = also."},r:"Also = mid-sentence addition."},
{id:"L1cn21",ty:"dd",tid:"connectors",sid:"cn-addition",p:"___1___ the cost, there are logistical challenges to consider.",b:[{id:"b1",o:["Besides","Despite","However","Therefore"],c:0,l:"___1___"}],x:{b1:"'Besides' = 'in addition to'. Adding another concern on top of cost."},r:"Besides + noun = in addition to."},
{id:"L1cn22",ty:"dd",tid:"connectors",sid:"cn-addition",p:"The restaurant has great food. ___1___, the prices are reasonable.",b:[{id:"b1",o:["Besides","However","Therefore","Although"],c:0,l:"___1___"}],x:{b1:"Adding another positive point as afterthought = Besides (adverb)."},r:"Besides = moreover (informal)."},
{id:"L1cn23",ty:"dd",tid:"connectors",sid:"cn-addition",p:"The candidate demonstrated exceptional technical skills. ___1___, her leadership potential was equally impressive.",b:[{id:"b1",o:["Furthermore","However","Consequently","Nevertheless"],c:0,l:"___1___"}],x:{b1:"Adding another impressive quality = Furthermore."},r:"Furthermore = building cumulative case."},
{id:"L1cn24",ty:"dd",tid:"connectors",sid:"cn-addition",p:"The hotel provides room service. It ___1___ offers airport transfers.",b:[{id:"b1",o:["also","however","therefore","moreover"],c:0,l:"___1___"}],x:{b1:"Adding another service mid-sentence = also (before main verb)."},r:"Also = mid-sentence before main verb."},
{id:"L1cn25",ty:"dg",tid:"connectors",sid:"cn-addition",p:"The university has research partnerships. _B1_, it has developed an exchange programme. _B2_ reducing costs, the system improved security.",bl:["Moreover","In addition to"],bk:["Moreover","Furthermore","In addition","In addition to","However","Despite","Although","Therefore"],x:"New sentence adding point = Moreover. Preposition + gerund = In addition to.",r:"Moreover starts sentence. In addition to + gerund."},
{id:"L1cn26",ty:"dd",tid:"connectors",sid:"cn-addition",p:"___1___ being a talented musician, she is also an accomplished painter.",b:[{id:"b1",o:["Besides","Despite","Although","However"],c:0,l:"___1___"}],x:{b1:"'being' = gerund. Besides + gerund = in addition to."},r:"Besides + gerund = in addition to."},
{id:"L1cn27",ty:"dg",tid:"connectors",sid:"cn-addition",p:"The Silk Road facilitated trade. _B1_, it served as a conduit for spreading religions. He plays guitar and _B2_ composes his own music.",bl:["Furthermore","also"],bk:["Furthermore","Moreover","However","Nevertheless","also","too","besides","therefore"],x:"New sentence adding major function = Furthermore. Mid-sentence addition = also.",r:"Furthermore starts sentence. Also mid-sentence."},
{id:"L1cn28",ty:"dd",tid:"connectors",sid:"cn-addition",p:"The new software is faster than its predecessor. ___1___, it uses significantly less memory.",b:[{id:"b1",o:["Furthermore","However","Consequently","Nevertheless"],c:0,l:"___1___"}],x:{b1:"Adding another improvement = Furthermore."},r:"Furthermore = another supporting point."},
{id:"L1cn29",ty:"dd",tid:"connectors",sid:"cn-addition",p:"The scholarship covers tuition fees. ___1___, it provides a monthly living allowance.",b:[{id:"b1",o:["In addition","Despite","However","Although"],c:0,l:"___1___"}],x:{b1:"Adding extra benefit at start of new sentence."},r:"In addition = adverb, starts new sentence."},
{id:"L1cn30",ty:"dg",tid:"connectors",sid:"cn-addition",p:"_B1_ the environmental benefits, electric vehicles offer lower running costs. The museum houses ancient artefacts and _B2_ features a modern art gallery.",bl:["Besides","also"],bk:["Besides","Despite","Although","Moreover","also","too","however","therefore"],x:"'the environmental benefits' = noun → Besides + noun. Mid-sentence = also.",r:"Besides + noun. Also mid-sentence."},
// CONNECTORS: CAUSE & EFFECT (15) 🆕
{id:"L1cn31",ty:"dd",tid:"connectors",sid:"cn-cause",p:"The evidence was conclusive. ___1___, the committee approved the proposal.",b:[{id:"b1",o:["Therefore","However","Moreover","Although"],c:0,l:"___1___"}],x:{b1:"Evidence caused approval — logical result."},r:"Therefore = logical consequence."},
{id:"L1cn32",ty:"dd",tid:"connectors",sid:"cn-cause",p:"He neglected his health. ___1___, he fell seriously ill.",b:[{id:"b1",o:["Consequently","Nevertheless","Furthermore","Although"],c:0,l:"___1___"}],x:{b1:"Neglect directly caused illness."},r:"Consequently = direct consequence."},
{id:"L1cn33",ty:"dd",tid:"connectors",sid:"cn-cause",p:"The region lacks rainfall; ___1___, irrigation is essential for farming.",b:[{id:"b1",o:["hence","moreover","whereas","although"],c:0,l:"___1___"}],x:{b1:"Formal cause-effect — no rain means irrigation needed."},r:"Hence = very formal cause-effect."},
{id:"L1cn34",ty:"dd",tid:"connectors",sid:"cn-cause",p:"Global temperatures have risen steadily. ___1___, ice sheets are melting at an unprecedented rate.",b:[{id:"b1",o:["As a result","Moreover","However","Although"],c:0,l:"___1___"}],x:{b1:"Temperature rise CAUSED melting."},r:"As a result = neutral cause-effect."},
{id:"L1cn35",ty:"dd",tid:"connectors",sid:"cn-cause",p:"The match was postponed ___1___ heavy rain.",b:[{id:"b1",o:["due to","despite","moreover","whereas"],c:0,l:"___1___"}],x:{b1:"'heavy rain' = noun. Due to + noun shows cause."},r:"Due to + noun = because of."},
{id:"L1cn36",ty:"dd",tid:"connectors",sid:"cn-cause",p:"___1___ you are already here, you might as well stay.",b:[{id:"b1",o:["Since","Despite","However","Moreover"],c:0,l:"___1___"}],x:{b1:"Known reason — you're here, so stay. Since = known reason."},r:"Since = already known reason."},
{id:"L1cn37",ty:"dd",tid:"connectors",sid:"cn-cause",p:"The data was incomplete. ___1___, the conclusions were unreliable.",b:[{id:"b1",o:["Therefore","However","Moreover","Although"],c:0,l:"___1___"}],x:{b1:"Bad data logically leads to bad conclusions."},r:"Therefore = logical consequence."},
{id:"L1cn38",ty:"dd",tid:"connectors",sid:"cn-cause",p:"Several flights were delayed ___1___ fog at the airport.",b:[{id:"b1",o:["due to","despite","moreover","whereas"],c:0,l:"___1___"}],x:{b1:"'fog' = noun. Due to + noun = cause."},r:"Due to + noun."},
{id:"L1cn39",ty:"dd",tid:"connectors",sid:"cn-cause",p:"The compound was found to be toxic. ___1___, all products containing it were recalled.",b:[{id:"b1",o:["Consequently","Nevertheless","Furthermore","Although"],c:0,l:"___1___"}],x:{b1:"Toxicity directly caused the recall."},r:"Consequently = direct consequence."},
{id:"L1cn40",ty:"dg",tid:"connectors",sid:"cn-cause",p:"The bridge was closed _B1_ structural damage. _B2_ the data supports the hypothesis, further testing may not be needed.",bl:["due to","Since"],bk:["due to","despite","however","although","Since","Because","Moreover","Therefore"],x:"'structural damage' = noun → due to. Known reason causing action = Since.",r:"Due to + noun. Since = known reason."},
{id:"L1cn41",ty:"dd",tid:"connectors",sid:"cn-cause",p:"The sample size was too small; ___1___, the results cannot be generalised.",b:[{id:"b1",o:["hence","moreover","whereas","although"],c:0,l:"___1___"}],x:{b1:"Very formal — small sample caused unreliable results."},r:"Hence = formal cause-effect."},
{id:"L1cn42",ty:"dd",tid:"connectors",sid:"cn-cause",p:"Interest rates have risen sharply. ___1___, borrowing has become significantly more expensive.",b:[{id:"b1",o:["Therefore","However","Moreover","Nevertheless"],c:0,l:"___1___"}],x:{b1:"Rate rises caused expensive borrowing."},r:"Therefore = logical result."},
{id:"L1cn43",ty:"dg",tid:"connectors",sid:"cn-cause",p:"She trained rigorously. _B1_, she won the competition. The project failed _B2_ the budget was cut.",bl:["As a result","because"],bk:["As a result","Moreover","However","Nevertheless","because","despite","due to","since"],x:"Training caused winning = As a result. Full clause follows = because (not due to).",r:"As a result = consequence. Because + clause."},
{id:"L1cn44",ty:"dd",tid:"connectors",sid:"cn-cause",p:"___1___ rising costs, the project was scaled back.",b:[{id:"b1",o:["Due to","Despite","Moreover","However"],c:0,l:"___1___"}],x:{b1:"'rising costs' = noun. Due to + noun = cause. Despite would mean opposite."},r:"Due to = cause. Despite = contrast."},
{id:"L1cn45",ty:"dg",tid:"connectors",sid:"cn-cause",p:"_B1_ both candidates have equal qualifications, the decision will be based on interview performance. He was the most experienced candidate, _B2_ his selection.",bl:["Since","hence"],bk:["Since","Because","Although","Despite","hence","moreover","however","therefore"],x:"Known equal qualifications = Since. Experience caused selection = hence (formal).",r:"Since = known reason. Hence = formal cause."},
// CONNECTORS: SEQUENCE (15) 🆕
{id:"L1cn46",ty:"dd",tid:"connectors",sid:"cn-sequence",p:"___1___, we need to identify the core problem. Secondly, we must develop a strategy.",b:[{id:"b1",o:["Firstly","Finally","Moreover","Therefore"],c:0,l:"___1___"}],x:{b1:"Starts numbered sequence — confirmed by 'Secondly'."},r:"Firstly = starts numbered list."},
{id:"L1cn47",ty:"dd",tid:"connectors",sid:"cn-sequence",p:"He graduated in 2020 and ___1___ moved to London.",b:[{id:"b1",o:["subsequently","consequently","moreover","however"],c:0,l:"___1___"}],x:{b1:"What happened NEXT in time — no cause implied."},r:"Subsequently = next in time sequence."},
{id:"L1cn48",ty:"dd",tid:"connectors",sid:"cn-sequence",p:"After months of deliberation, the committee ___1___ reached a decision.",b:[{id:"b1",o:["finally","moreover","however","therefore"],c:0,l:"___1___"}],x:{b1:"After a long time = finally (mid-sentence)."},r:"Finally = after a long wait."},
{id:"L1cn49",ty:"dd",tid:"connectors",sid:"cn-sequence",p:"She prepared the presentation. ___1___, her colleague set up the equipment.",b:[{id:"b1",o:["Meanwhile","Therefore","However","Moreover"],c:0,l:"___1___"}],x:{b1:"Two things happening at the same time."},r:"Meanwhile = parallel events."},
{id:"L1cn50",ty:"dd",tid:"connectors",sid:"cn-sequence",p:"___1___, the evidence strongly supports the proposed policy change.",b:[{id:"b1",o:["In conclusion","Moreover","However","Subsequently"],c:0,l:"___1___"}],x:{b1:"Final summary wrapping up an argument."},r:"In conclusion = closing summary."},
{id:"L1cn51",ty:"dd",tid:"connectors",sid:"cn-sequence",p:"The archaeological site was discovered accidentally. ___1___, a full-scale excavation was organised.",b:[{id:"b1",o:["Subsequently","Consequently","Moreover","However"],c:0,l:"___1___"}],x:{b1:"Excavation happened AFTER discovery — time sequence, not cause."},r:"Subsequently = next in time, not cause."},
{id:"L1cn52",ty:"dd",tid:"connectors",sid:"cn-sequence",p:"Scientists worked to develop a vaccine. ___1___, governments imposed lockdowns to slow the spread.",b:[{id:"b1",o:["Meanwhile","Therefore","Furthermore","Consequently"],c:0,l:"___1___"}],x:{b1:"Two parallel actions at the same time."},r:"Meanwhile = same time, different actors."},
{id:"L1cn53",ty:"dd",tid:"connectors",sid:"cn-sequence",p:"___1___, it should be noted that these findings are preliminary and require further investigation.",b:[{id:"b1",o:["Finally","Moreover","However","Therefore"],c:0,l:"___1___"}],x:{b1:"Last point in a sequence of observations."},r:"Finally = last point in list."},

{id:"Q113",ty:"dd",sids:["cn-contrast","pg-whatwhich"],p:"The company has grown rapidly. ___1___, employee satisfaction has declined. The question ___2___ this trend will continue concerns the board.",b:[{id:"b1",o:["However","Moreover","Therefore","Furthermore"],c:0,l:"___1___"},{id:"b2",o:["which","what","where","whether"],c:3,l:"___2___"}],x:{b1:"Growth vs declining satisfaction = contrast → However.",b2:"Continue or not = yes/no → WHETHER."},r:"However = contrast. WHETHER = uncertainty. 🆕"},

{id:"Q115",ty:"dd",sids:["cn-contrast","pg-wordtype"],p:"___1___ widespread criticism, the government proceeded with the reforms. Key challenges include rising costs, limited ___2___, and staff shortages.",b:[{id:"b1",o:["Despite","Although","However","Nevertheless"],c:0,l:"___1___"},{id:"b2",o:["resource","resourceful","resources","resourcing"],c:2,l:"___2___"}],x:{b1:"'widespread criticism' = noun → Despite.",b2:"Noun list: costs, resources, shortages → resources (noun)."},r:"Despite + noun. Noun list → noun. 🆕"},

{id:"Q123",ty:"dd",sids:["cn-addition","pg-wordtype"],p:"The candidate has experience. ___1___, she holds advanced degrees. Key strengths include leadership, clear ___2___, and resilience.",b:[{id:"b1",o:["Moreover","However","Nevertheless","Consequently"],c:0,l:"___1___"},{id:"b2",o:["communicate","communicating","communication","communicative"],c:2,l:"___2___"}],x:{b1:"Adding another impressive quality = Moreover.",b2:"Noun list: leadership, communication, resilience → noun."},r:"Moreover = addition. Noun list → noun. 🆕"},
{id:"Q124",ty:"dg",sids:["cn-addition","cn-contrast"],p:"The study found a positive link between exercise and mental health. _B1_, participants who exercised regularly reported lower anxiety. The study had limitations. _B2_, the sample size was small.",bl:["Moreover","Furthermore"],bk:["Moreover","Furthermore","However","Nevertheless","Although","Despite","Consequently","Therefore"],x:"Adding supporting data = Moreover. Adding another limitation = Furthermore.",r:"Both addition — same direction points. 🆕"},

{id:"Q127",ty:"dg",sids:["cn-addition","pg-othertheir"],p:"_B1_ providing mentorship, the programme offers scholarships. Each student submitted _B2_ application before the deadline.",bl:["Besides","their"],bk:["Besides","Despite","Although","Moreover","their","other","others","its"],x:"'providing' = gerund → Besides + gerund. Application belonging to each student = their.",r:"Besides + gerund. THEIR = belonging. 🆕"},
{id:"Q128",ty:"dd",sids:["cn-addition","cn-contrast"],p:"The ancient Silk Road facilitated trade. ___1___, it spread religions across vast distances. ___2___, some historians argue its impact has been exaggerated.",b:[{id:"b1",o:["Furthermore","However","Therefore","Nevertheless"],c:0,l:"___1___"},{id:"b2",o:["However","Furthermore","Moreover","Besides"],c:0,l:"___2___"}],x:{b1:"Adding another major function = Furthermore.",b2:"Contrasting historians' view = However."},r:"Furthermore = add. However = contrast. 🆕"},

{id:"Q133",ty:"dd",sids:["cn-cause","cn-addition"],p:"The drug reduced inflammation. ___1___, it lowered blood pressure. ___2___, it improved overall cardiovascular health.",b:[{id:"b1",o:["Furthermore","Therefore","However","Nevertheless"],c:0,l:"___1___"},{id:"b2",o:["Moreover","However","Nevertheless","Although"],c:0,l:"___2___"}],x:{b1:"Adding second benefit = Furthermore.",b2:"Adding third benefit = Moreover."},r:"Tricky! Both addition — not cause-effect. 🆕"},
{id:"Q134",ty:"dg",sids:["cn-cause","pg-hypothetical"],p:"_B1_ the policy was introduced, crime rates have dropped. Without this policy, crime _B2_ significantly higher.",bl:["Since","would be"],bk:["Since","Because","Although","Despite","would be","was","is","being"],x:"Time/reason since = Since. Imaginary scenario without policy = would be.",r:"Since = reason/time. WOULD BE = hypothetical. 🆕"},

{id:"Q137",ty:"dg",sids:["cn-cause","cn-contrast"],p:"_B1_ the increasing demand for housing, prices have risen sharply. _B2_ government efforts to control prices, the trend continues.",bl:["Due to","Despite"],bk:["Due to","Despite","Because","Although","However","Moreover","Therefore","Consequently"],x:"Demand caused price rise = Due to. Prices continue despite efforts = Despite.",r:"Due to = cause. Despite = contrast. 🆕"},
{id:"Q138",ty:"dd",sids:["cn-cause","pg-wordtype"],p:"The airline cancelled flights. ___1___, thousands were stranded. Key issues include poor ___2___, delayed responses, and staff shortages.",b:[{id:"b1",o:["As a result","Moreover","However","Nevertheless"],c:0,l:"___1___"},{id:"b2",o:["communicate","communicating","communication","communicative"],c:2,l:"___2___"}],x:{b1:"Cancellation caused stranding = As a result.",b2:"Noun list: communication, responses, shortages → noun."},r:"As a result = consequence. Noun list → noun. 🆕"},

{id:"Q142",ty:"dg",sids:["cn-sequence","cn-contrast"],p:"_B1_, we need to identify the problem. Secondly, we develop a plan. _B2_, some argue that planning is overrated.",bl:["Firstly","However"],bk:["Firstly","However","Moreover","Therefore","Finally","Subsequently","Meanwhile","Consequently"],x:"Starting numbered list = Firstly. Contrasting view = However.",r:"Firstly = start sequence. However = contrast. 🆕"},
{id:"Q143",ty:"dd",sids:["cn-sequence","cn-addition"],p:"She prepared the presentation. ___1___, her colleague set up the equipment. ___2___, the marketing team prepared the promotional materials.",b:[{id:"b1",o:["Meanwhile","Therefore","However","Moreover"],c:0,l:"___1___"},{id:"b2",o:["Furthermore","However","Consequently","Nevertheless"],c:0,l:"___2___"}],x:{b1:"Two things at same time = Meanwhile.",b2:"Adding another parallel activity = Furthermore."},r:"Meanwhile = parallel. Furthermore = adding more. 🆕"},
{id:"Q144",ty:"dg",sids:["cn-sequence","pg-hypothetical"],p:"After years of negotiations, the two countries _B1_ signed a peace agreement. Without this agreement, tensions _B2_ much higher today.",bl:["finally","would be"],bk:["finally","subsequently","consequently","moreover","would be","was","is","being"],x:"After long time = finally. Imaginary without agreement = would be.",r:"Finally = long wait. WOULD BE = hypothetical. 🆕"},
{id:"Q145",ty:"dd",sids:["cn-sequence","cn-cause"],p:"The volcano erupted in the morning. The surrounding villages were ___1___ evacuated. The eruption was ___2___ a shift in tectonic pressure.",b:[{id:"b1",o:["subsequently","consequently","moreover","however"],c:0,l:"___1___"},{id:"b2",o:["due to","despite","moreover","whereas"],c:0,l:"___2___"}],x:{b1:"Evacuation happened NEXT — time sequence.",b2:"'a shift' = noun → due to."},r:"Subsequently = time. Due to + noun. 🆕"},
{id:"Q146",ty:"dd",sids:["cn-sequence","cn-contrast"],p:"___1___, while technology has transformed education, it cannot replace dedicated teachers. ___2___, many schools still lack basic digital infrastructure.",b:[{id:"b1",o:["In conclusion","Moreover","Subsequently","Meanwhile"],c:0,l:"___1___"},{id:"b2",o:["Moreover","In conclusion","Subsequently","Meanwhile"],c:0,l:"___2___"}],x:{b1:"Final summary of argument = In conclusion.",b2:"Adding another problem = Moreover."},r:"In conclusion = summary. Moreover = addition. 🆕"},

const SK="gf9";
function ld(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}}
function sv(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch{}}
let st=ld();
if(!st.l1)st.l1={};if(!st.l2)st.l2={};if(!st.kb)st.kb={};if(!st.l2w)st.l2w=[];
if(!st.errors)st.errors={};// errors per sub-topic sid: {sid: count}
if(!st.blankStats)st.blankStats={total:0,correct:0,wrong:0};// per-blank stats
if(!st.blankErrors)st.blankErrors={};// per-blank errors by sid: {sid: {wrong:N, total:N}}
if(!window._accOpen)window._accOpen={};// accordion open state — NOT in localStorage, just in memory
L1.forEach(q=>{if(!st.l1[q.id])st.l1[q.id]="new"});
// Merge L1 into L2 for Question Bank (convert L1 format to L2 format)
const L1forQB=L1.map(q=>{const q2=Object.assign({},q);q2.id="QB_"+q.id;if(!q2.sids){q2.sids=q2.sid?[q2.sid]:[]}return q2});
const AllQB=[...L2,...L1forQB];
AllQB.forEach(q=>{if(!st.l2[q.id])st.l2[q.id]="new"});
L2.forEach(q=>{if(!st.l2[q.id])st.l2[q.id]="new"});
allSL().forEach(({tid,sid})=>{if(st.kb[tid+"/"+sid]===undefined)st.kb[tid+"/"+sid]=false});
sv(st);

// Count blanks in a question
function countBlanks(q){if(q.ty==="dd")return q.b.length;return q.bl.length}
// Track per-blank stats on submit
function trackBlanks(q,ans,sids){
  const bc=countBlanks(q);
  let wrongCount=0;
  if(q.ty==="dd"){q.b.forEach(b=>{st.blankStats.total++;if(ans[b.id]===b.c){st.blankStats.correct++}else{st.blankStats.wrong++;wrongCount++}})}
  else{q.bl.forEach((cw,i)=>{const bid="B"+(i+1);st.blankStats.total++;if(ans[bid]&&ans[bid].toLowerCase()===cw.toLowerCase()){st.blankStats.correct++}else{st.blankStats.wrong++;wrongCount++}})}
  // Track per-topic blank errors
  const ss=sids||(q.sids?q.sids:(q.sid?[q.sid]:[]));
  ss.forEach(sid=>{if(!st.blankErrors[sid])st.blankErrors[sid]={wrong:0,total:0};st.blankErrors[sid].total+=bc;st.blankErrors[sid].wrong+=wrongCount});
  sv(st);
}
// Get sorted blank errors by topic
function sortedBlankErrors(){return Object.entries(st.blankErrors).sort((a,b)=>b[1].wrong-a[1].wrong)}

let S={v:"main",mt:"topics",tid:null,sid:null,qi:0,ql:[],ans:{},sub:false,sw:null,kbi:0,stab:"learn",
  l2i:0,l2list:[],l2ans:{},l2sub:false,l2sw:null,l2relearn:false,l2relearnSids:[]};

// ── Helpers ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function l1cts(tid){let n=0,p=0,l=0;const qs=tid?L1.filter(q=>q.tid===tid):L1;qs.forEach(q=>{const s=st.l1[q.id];if(s==="new")n++;else if(s==="practice")p++;else l++});return{n,p,l,t:qs.length}}
function l2cts(){let n=0,p=0,l=0;AllQB.forEach(q=>{const s=st.l2[q.id];if(s==="new")n++;else if(s==="practice")p++;else l++});return{n,p,l,t:AllQB.length}}
function subKBDone(tid,sid){return st.kb[tid+"/"+sid]===true}
function subL1Done(tid,sid){const qs=L1.filter(q=>q.tid===tid&&q.sid===sid);return qs.length>0&&qs.every(q=>st.l1[q.id]==="learned")}
function subDone(tid,sid){return subKBDone(tid,sid)&&subL1Done(tid,sid)}
function topicPct(tid){const subs=gS(tid);if(!subs.length)return 0;return Math.round((subs.filter(s=>subDone(tid,s)).length/subs.length)*100)}
function overallPct(){const all=allSL();if(!all.length)return{done:0,total:0,pct:0};const done=all.filter(({tid,sid})=>subDone(tid,sid)).length;return{done,total:all.length,pct:Math.round((done/all.length)*100)}}
function nextKBI(tid){const subs=gS(tid);for(let i=0;i<subs.length;i++){if(!st.kb[tid+"/"+subs[i]])return i}return subs.length}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function isCorrect(q,ans){if(q.ty==="dd"){let ok=true;q.b.forEach(b=>{if(ans[b.id]!==b.c)ok=false});return ok}let ok=true;q.bl.forEach((cw,i)=>{const bid="B"+(i+1);if(!ans[bid]||ans[bid].toLowerCase()!==cw.toLowerCase())ok=false});return ok}
function getSubErrors(sid){return st.errors[sid]||0}
function getTopicErrors(tid){let t=0;gS(tid).forEach(sid=>{t+=getSubErrors(sid)});return t}
function topSortedErrors(){return Object.entries(st.errors).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,8)}

function R(){
  const a=document.getElementById("app");let h="";
  if(S.v==="main")h=rMain();
  else if(S.v==="topic")h=rTopic();
  else if(S.v==="cheat")h=rCheat();
  else if(S.v==="subdetail")h=rSubDetail();
  else if(S.v==="kb")h=rKB();
  else if(S.v==="l1")h=rL1();
  else if(S.v==="l2")h=rL2();
  else if(S.v==="l2relearn")h=rL2Relearn();
  h+='<div class="wm">Pearson Test of English \xb7 Grammar Practice</div>';
  a.innerHTML=h;
  document.querySelectorAll(".ds").forEach(s=>{s.addEventListener("change",e=>{
    if(S.v==="l2")S.l2ans[e.target.dataset.b]=parseInt(e.target.value);
    else S.ans[e.target.dataset.b]=parseInt(e.target.value);
  })});
}

// ── MAIN SCREEN ──
function rMain(){
  const o=overallPct();const lc=l2cts();
  let h='<div style="animation:slideUp .3s ease">';
  // Header
  h+='<div class="header"><div><div class="header-label">PTE Preparation</div><h1>Grammar Practice</h1></div></div>';
  // KPI row
  h+='<div class="kpi-row"><div class="kpi-card"><div class="kpi-icon" style="background:var(--accentBg)">📝</div><div><div class="kpi-val">'+o.done+'/'+o.total+'</div><div class="kpi-label">Sub-topics</div></div></div><div class="kpi-card"><div class="kpi-icon" style="background:rgba(54,67,149,.08)">📊</div><div><div class="kpi-val">'+o.pct+'%</div><div class="kpi-label">Mastery</div></div></div></div>';
  // Progress bar

function startL2(forceNew){
  if(st.l2w&&st.l2w.length>0){S.l2relearnSids=[...st.l2w];S.v="l2relearn";R();return}
  // Resume saved session if exists and not forcing new
  if(!forceNew&&st.l2session&&st.l2session.list&&st.l2session.list.length>0&&st.l2session.idx<st.l2session.list.length){
    // Rebuild question objects from saved IDs
    const idMap={};AllQB.forEach(q=>idMap[q.id]=q);
    const qs=st.l2session.list.map(id=>idMap[id]).filter(Boolean);
    if(qs.length>0){
      S.l2list=qs;S.l2i=st.l2session.idx;S.l2ans={};S.l2sub=false;S.l2sw=null;S.l2relearn=false;S.v="l2";R();return;
    }
  }
  // Start fresh session
  const qs=shuffle(AllQB).sort((a,b)=>{const o={new:0,practice:1,learned:2};return(o[st.l2[a.id]]||0)-(o[st.l2[b.id]]||0)});
  S.l2list=qs;S.l2i=0;S.l2ans={};S.l2sub=false;S.l2sw=null;S.l2relearn=false;

  st.l2session={list:qs.map(q=>q.id),idx:0};sv(st);
  S.v="l2";R();
}

  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;color:var(--textMuted)">Q '+String(S.l2i+1)+'/'+tot+'</span><span style="font-size:10px;padding:3px 10px;border-radius:6px;background:'+(s==="new"?'rgba(54,67,149,.08)':s==="practice"?'var(--warningBg)':'var(--successBg)')+';color:'+(s==="new"?'var(--primary)':s==="practice"?'var(--warning)':'var(--success)')+';font-weight:600">'+s.toUpperCase()+'</span></div>';
  h+='<div class="progress-bar" style="margin-bottom:14px"><div class="progress-fill" style="width:'+String(((S.l2i+1)/tot)*100)+'%"></div></div>';
  h+='<div class="q-card"><div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">'+(q.ty==="dd"?'\uD83D\uDCCB Dropdown':'\uD83D\uDD90 Drag & Drop')+' \xb7 Question Bank</div>';
  h+=renderQ(q,S.l2ans,S.l2sub,S.l2sw,"l2");
  h+='</div>';
  if(!S.l2sub)h+='<button class="btn-primary" onclick="subL2()">Submit Answer</button>';
  else{
    h+=renderFB(q,S.l2ans,"l2");
    if(st.l2w&&st.l2w.length>0){
      h+='<div class="error-banner" style="margin-top:8px"><span style="font-size:20px">\uD83D\uDCD6</span><span style="font-size:12px;font-weight:600;color:var(--error);margin-left:10px">You must relearn '+st.l2w.length+' sub-topic'+(st.l2w.length>1?'s':'')+' before continuing.</span></div>';
      h+='<button class="btn-relearn" style="margin-top:8px" onclick="S.l2relearnSids=[...st.l2w];S.l2relearn=true;S.v=\'l2relearn\';R()">\uD83D\uDCD6 Relearn Before Continuing</button>';
    }else{
      h+='<button class="btn-primary" style="margin-top:8px" onclick="nxL2()">'+(S.l2i<tot-1?'Next Question \u2192':'Done')+'</button>';
    }
  }
  h+='</div>';return h;
}
function subL2(){
  const q=S.l2list[S.l2i];S.l2sub=true;
  const ok=isCorrect(q,S.l2ans);
  st.l2[q.id]=ok?"learned":"practice";
  trackBlanks(q,S.l2ans,q.sids);
  if(!ok&&q.sids){
    q.sids.forEach(sid=>{if(!st.l2w.includes(sid))st.l2w.push(sid);st.errors[sid]=(st.errors[sid]||0)+1});
  }
  // Save current position — save the NEXT index so resume skips already-answered
  st.l2session={list:S.l2list.map(q=>q.id),idx:S.l2i+1};
  sv(st);R();
}
function nxL2(){if(S.l2i<S.l2list.length-1){S.l2i++;S.l2ans={};S.l2sub=false;S.l2sw=null;saveL2Progress();R();window.scrollTo({top:0,behavior:"smooth"})}else{
  // Session complete - clear saved session
  delete st.l2session;sv(st);
  S.v="main";S.mt="qbank";R()
}}

// ── L2 RELEARN ──
function rL2Relearn(){
  let h='<div style="padding:12px 16px;animation:slideUp .3s ease">';
  h+='<button class="btn-back" onclick="S.v=\'main\';S.mt=\'qbank\';R()">\u2190 Back</button>';
  h+='<div class="relearn-card" style="border:2px solid var(--magenta);margin-top:0;margin-bottom:16px"><div style="font-size:16px;font-weight:700;color:var(--magenta);margin-bottom:4px">\uD83D\uDCD6 Relearn Required</div><div style="font-size:13px;color:var(--textSec);line-height:1.5">Review all sub-topics below before continuing. Read each one carefully.</div></div>';
  S.l2relearnSids.forEach(sid=>{
    const tid=findTidForSid(sid);if(!tid)return;
    h+=renderKBContent(tid,sid);
  });
  h+='<button class="btn-primary" onclick="clearL2Weak()">\u2713 I have relearned these - Continue</button>';
  h+='</div>';return h;
}
function clearL2Weak(){st.l2w=[];sv(st);if(S.l2relearn&&S.l2list.length>0){S.l2relearn=false;S.l2sub=false;S.l2ans={};S.l2sw=null;S.l2i++;S.v="l2";R();window.scrollTo({top:0,behavior:"smooth"})}else{startL2()}}

function resetAllProgress(){
  if(!confirm('⚠️ Are you sure you want to reset ALL progress?\n\nThis will erase:\n• All question history\n• All blank stats\n• All error tracking\n• Your saved session\n\nThis cannot be undone.'))return;
  if(!confirm('🚨 FINAL WARNING: This will permanently delete ALL your progress. Are you absolutely sure?'))return;
  st={l1:{},l2:{},kb:{},l2w:[],errors:{},blankStats:{total:0,correct:0,wrong:0},blankErrors:{}};
  delete st.l2session;
  L1.forEach(q=>st.l1[q.id]='new');
  AllQB.forEach(q=>st.l2[q.id]='new');
  allSL().forEach(({tid,sid})=>{st.kb[tid+'/'+sid]=false});
  sv(st);R();
}

// ══════════════════════════════════════════════════════════════
// SHARED Q RENDERING
// ══════════════════════════════════════════════════════════════
function renderQ(q,ans,submitted,selWord,level){
  if(q.ty==="dd")return rDD(q,ans,submitted);
  return rDG(q,ans,submitted,selWord,level);
}
function rDD(q,ans,sub){let p=q.p;q.b.forEach(b=>{if(sub){const sel=ans[b.id];const ok=sel===b.c;p=p.replace(b.l,'<span class="blank-zone '+(ok?"correct":"wrong")+'">'+b.o[sel!==undefined?sel:0]+'</span>')}else{let opts='<option value="-1" '+(ans[b.id]===undefined?"selected":"")+'>Select...</option>';b.o.forEach((o,i)=>{opts+='<option value="'+i+'" '+(ans[b.id]===i?"selected":"")+'>'+o+'</option>'});p=p.replace(b.l,'<select class="q-select ds" data-b="'+b.id+'">'+opts+'</select>')}});return'<div class="q-passage">'+p+'</div>'}
function rDG(q,ans,sub,sw,level){
  let p=q.p;const ua=ans||{};
  const fn1=level==="l2"?"pwL2":"pw";
  const fn2=level==="l2"?"selWL2":"selW";
  q.bl.forEach(function(cw,i){
    const bid="B"+(i+1);const pl=ua[bid];
    if(sub){const ok=pl&&pl.toLowerCase()===cw.toLowerCase();
      p=p.replace("_"+bid+"_",'<span class="blank-zone '+(ok?"correct":"wrong")+'">'+(pl||"___")+"</span>")
    }else{
      p=p.replace("_"+bid+"_",'<span class="blank-zone '+(pl?"filled":"")+'" onclick="'+fn1+'(\&quot;'+bid+'\&quot;)">'+(pl||"tap")+"</span>")
    }
  });
  let h='<div class="q-passage">'+p+"</div>";
  if(!sub){h+='<div class="word-bank">';
    q.bk.forEach(function(w){
      const us=Object.values(ua).includes(w);
      const curSw=level==="l2"?S.l2sw:S.sw;
      const safe=w.replace(/'/g,"&#39;");
      h+='<span class="word-chip '+(us?"used":"")+(curSw===w?" selected":"")+'" onclick="'+fn2+'(\&quot;'+safe+'\&quot;)">'+w+"</span>"
    });h+="</div>"}
  return h
}
function renderFB(q,ans,level){
  let ok=isCorrect(q,ans);let h="";
  if(q.ty==="dd"){
    if(ok){h+='<div class="fb-card correct"><div style="font-size:15px;font-weight:700;color:var(--success);margin-bottom:4px">\u2713 Correct!</div><div style="font-size:13px;color:var(--textSec);line-height:1.5">'+(typeof q.x==="string"?q.x:Object.values(q.x).join(" "))+'</div></div>'}
    else{h+='<div class="fb-card wrong"><div style="font-size:15px;font-weight:700;color:var(--error);margin-bottom:6px">\u2717 Not quite right</div>';
      // Per-blank breakdown
      q.b.forEach(b=>{if(ans[b.id]!==b.c){const sel=ans[b.id];
        h+='<div style="background:var(--errorBg);border-radius:10px;padding:10px 12px;margin-bottom:8px">';
        h+='<div style="font-size:13px;font-weight:700;color:var(--error);margin-bottom:4px">'+b.l+'</div>';
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="padding:3px 8px;background:rgba(211,47,47,.15);border-radius:6px;font-size:12px;font-weight:600;color:var(--error)">'+b.o[sel!==undefined?sel:0]+'</span><span style="font-size:14px">→</span><span style="padding:3px 8px;background:rgba(0,139,93,.15);border-radius:6px;font-size:12px;font-weight:600;color:var(--success)">'+b.o[b.c]+'</span></div>';
        h+='<div style="font-size:12px;color:var(--textSec);line-height:1.5">'+(q.x[b.id]||"")+'</div>';
        h+='</div>'}});
      // Quick rule reminder
      h+='<div style="background:var(--warningBg);border-radius:10px;padding:10px 12px;margin-top:4px"><div style="font-size:11px;font-weight:700;color:var(--warning);margin-bottom:2px">📏 Quick Rule</div><div style="font-size:12px;color:var(--warning);line-height:1.4">'+q.r+'</div></div>';
      // Show trap from topic if available
      const sids=q.sids||(q.sid?[q.sid]:[]);
      sids.forEach(sid=>{const tid=findTidForSid(sid);if(!tid)return;const sk=gSk(tid,sid);if(sk&&sk.trap){
        h+='<div style="background:rgba(157,19,72,.06);border:1px solid rgba(157,19,72,.15);border-radius:10px;padding:10px 12px;margin-top:8px">';
        h+='<div style="font-size:11px;font-weight:700;color:var(--magenta);margin-bottom:4px">⚠️ Common Trap: '+sk.title+'</div>';
        h+='<div style="font-size:11px;color:var(--error);margin-bottom:2px">✗ '+sk.trap.w+'</div>';
        h+='<div style="font-size:11px;color:var(--success);margin-bottom:2px">✓ '+sk.trap.r+'</div>';
        h+='<div style="font-size:11px;color:var(--textSec);font-style:italic">'+sk.trap.y+'</div>';
        h+='</div>'}});
      // Review link
      const reviewNames=getReviewNames(q);if(reviewNames)h+='<div style="margin-top:8px;font-size:11px;padding:6px 10px;border-radius:8px;background:var(--warningBg);color:var(--warning);font-weight:600">\uD83D\uDCD6 Review: '+reviewNames+'</div>';
      h+='</div>'}
  }else{
    if(ok){h+='<div class="fb-card correct"><div style="font-size:15px;font-weight:700;color:var(--success);margin-bottom:4px">\u2713 Correct!</div><div style="font-size:13px;color:var(--textSec);line-height:1.5">'+q.x+'</div></div>'}
    else{h+='<div class="fb-card wrong"><div style="font-size:15px;font-weight:700;color:var(--error);margin-bottom:6px">\u2717 Not quite right</div>';
      // Per-blank breakdown for drag-drop
      q.bl.forEach((cw,i)=>{const bid="B"+(i+1);const pl=ans[bid];if(!pl||pl.toLowerCase()!==cw.toLowerCase()){
        h+='<div style="background:var(--errorBg);border-radius:10px;padding:10px 12px;margin-bottom:8px">';
        h+='<div style="font-size:13px;font-weight:700;color:var(--error);margin-bottom:4px">Blank '+(i+1)+'</div>';
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="padding:3px 8px;background:rgba(211,47,47,.15);border-radius:6px;font-size:12px;font-weight:600;color:var(--error)">'+(pl||"empty")+'</span><span style="font-size:14px">→</span><span style="padding:3px 8px;background:rgba(0,139,93,.15);border-radius:6px;font-size:12px;font-weight:600;color:var(--success)">'+cw+'</span></div>';
        h+='</div>'}});
      // Explanation
      h+='<div style="font-size:13px;color:var(--textSec);line-height:1.5;margin-top:4px">'+q.x+'</div>';
      // Quick rule
      h+='<div style="background:var(--warningBg);border-radius:10px;padding:10px 12px;margin-top:8px"><div style="font-size:11px;font-weight:700;color:var(--warning);margin-bottom:2px">📏 Quick Rule</div><div style="font-size:12px;color:var(--warning);line-height:1.4">'+q.r+'</div></div>';
      // Show trap from topic if available
      const sids=q.sids||(q.sid?[q.sid]:[]);
      sids.forEach(sid=>{const tid=findTidForSid(sid);if(!tid)return;const sk=gSk(tid,sid);if(sk&&sk.trap){
        h+='<div style="background:rgba(157,19,72,.06);border:1px solid rgba(157,19,72,.15);border-radius:10px;padding:10px 12px;margin-top:8px">';
        h+='<div style="font-size:11px;font-weight:700;color:var(--magenta);margin-bottom:4px">⚠️ Common Trap: '+sk.title+'</div>';
        h+='<div style="font-size:11px;color:var(--error);margin-bottom:2px">✗ '+sk.trap.w+'</div>';
        h+='<div style="font-size:11px;color:var(--success);margin-bottom:2px">✓ '+sk.trap.r+'</div>';
        h+='<div style="font-size:11px;color:var(--textSec);font-style:italic">'+sk.trap.y+'</div>';
        h+='</div>'}});
      // Review link
      const reviewNames=getReviewNames(q);if(reviewNames)h+='<div style="margin-top:8px;font-size:11px;padding:6px 10px;border-radius:8px;background:var(--warningBg);color:var(--warning);font-weight:600">\uD83D\uDCD6 Review: '+reviewNames+'</div>';
      h+='</div>'}
  }
  return h;
}
function getReviewNames(q){
  if(q.sids)return q.sids.map(sid=>{const tid=findTidForSid(sid);return tid?gSk(tid,sid)?.title||sid:sid}).join(", ");
  if(q.sid&&q.tid)return gSk(q.tid,q.sid)?.title||"";
  return"";
}

// Word interactions
function selW(w){if(S.sub)return;if(S.sw===w){S.sw=null;R();return}Object.keys(S.ans).forEach(k=>{if(S.ans[k]===w)delete S.ans[k]});S.sw=w;R()}
function pw(bid){if(S.sub)return;if(S.sw){Object.keys(S.ans).forEach(k=>{if(S.ans[k]===S.sw)delete S.ans[k]});S.ans[bid]=S.sw;S.sw=null;R()}else if(S.ans[bid]){delete S.ans[bid];R()}}
function selWL2(w){if(S.l2sub)return;if(S.l2sw===w){S.l2sw=null;R();return}Object.keys(S.l2ans).forEach(k=>{if(S.l2ans[k]===w)delete S.l2ans[k]});S.l2sw=w;R()}
function pwL2(bid){if(S.l2sub)return;if(S.l2sw){Object.keys(S.l2ans).forEach(k=>{if(S.l2ans[k]===S.l2sw)delete S.l2ans[k]});S.l2ans[bid]=S.l2sw;S.l2sw=null;R()}else if(S.l2ans[bid]){delete S.l2ans[bid];R()}}

R();

</script>
