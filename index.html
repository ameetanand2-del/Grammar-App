<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F4F6FA;--w:#FFF;--c1:#FFF;--c2:#F8FAFB;--bd:#E4E8EF;--bd2:#D1D7E0;--tl:#2ABFAC;--tl2:#23A696;--tlb:rgba(42,191,172,.1);--pr:#7C6AF0;--prb:rgba(124,106,240,.08);--am:#EFA430;--amb:rgba(239,164,48,.08);--rd:#E05A5A;--rdb:rgba(224,90,90,.08);--bl:#4A90D9;--t1:#1A2138;--t2:#374155;--t3:#5A6580;--t4:#8994A7;--t5:#B0B8C8;--f:'Plus Jakarta Sans',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
html,body{background:var(--bg);color:var(--t1);font-family:var(--f);min-height:100vh}
button{font-family:var(--f);cursor:pointer}input,select{font-family:var(--f)}
.app{max-width:460px;margin:0 auto;padding:16px 14px 80px}
.hdr{margin-bottom:20px}.hdr .lb{color:var(--tl);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}.hdr h1{font-size:22px;font-weight:800;color:var(--t1)}.hdr .su{font-size:11px;color:var(--t4);margin-top:2px}
.cd{background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.pb{height:7px;background:var(--bd);border-radius:7px;overflow:hidden}.pb .fl{height:100%;border-radius:7px;transition:width .4s}
.tabs{display:flex;gap:3px;background:var(--c2);border:1px solid var(--bd);border-radius:12px;padding:3px;margin-bottom:16px}.tabs button{flex:1;padding:11px 0;border:none;border-radius:10px;background:transparent;color:var(--t4);font-size:12px;font-weight:600;transition:.15s}.tabs button.on{background:var(--tl);color:#fff;box-shadow:0 2px 6px rgba(42,191,172,.25)}
.ti{background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:.15s}.ti:active{border-color:var(--tl)}.ti .tp{display:flex;align-items:center;gap:10px;margin-bottom:8px}.ti .ico{font-size:22px}.ti .tit{font-size:15px;font-weight:700}.ti .st{margin-left:auto;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}.ti .mt{font-size:11px;color:var(--t4);margin-bottom:8px}.ti .pr{display:flex;align-items:center;gap:8px}.ti .pr .pc{font-size:12px;font-family:var(--m);font-weight:700;min-width:32px}
.cts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}.ct{background:var(--c1);border:1px solid var(--bd);border-radius:12px;text-align:center;padding:10px 4px}.ct .n{font-size:18px;font-weight:800;font-family:var(--m)}.ct .l{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.ar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}.ab{padding:14px;border-radius:14px;border:none;font-size:13px;font-weight:700;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.06)}.at{background:var(--tl);color:#fff}.ao{background:var(--c1);border:1px solid var(--bd);color:var(--t2)}
.kc{background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:10px;border-left:4px solid var(--tl);box-shadow:0 1px 3px rgba(0,0,0,.04)}.kc h3{font-size:15px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px}.kc .bg{font-size:9px;font-weight:700;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.06em;background:var(--tlb);color:var(--tl)}.kc p{font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:10px}.kc .po{font-size:10px;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}.kc .pv{font-size:12px;color:var(--t3);background:var(--c2);padding:10px 12px;border-radius:10px;margin-bottom:10px;border:1px solid var(--bd)}.kc .el{font-size:10px;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}.kc .ex{border-left:3px solid var(--tl);padding:8px 12px;font-size:12px;color:var(--t2);font-style:italic;margin-bottom:6px;background:var(--c2);border-radius:0 10px 10px 0}.kc .tl2{font-size:10px;font-weight:700;color:var(--rd);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px}.kc .trp{background:var(--rdb);border:1px solid rgba(224,90,90,.15);border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:6px}.kc .trp .wr{color:var(--rd);font-weight:600}.kc .trp .rt{color:var(--tl);font-weight:600}.kc .trp .wy{color:var(--t3);margin-top:4px;font-size:11px}
.qc{background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.qc .qh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.qc .qt{font-size:9px;font-weight:700;padding:3px 10px;border-radius:8px;text-transform:uppercase;letter-spacing:.06em;font-family:var(--m)}.qc .qn{font-size:11px;color:var(--t4);font-family:var(--m)}.qc .ps{font-size:14px;color:var(--t2);line-height:1.9;margin-bottom:16px}
.qc select{padding:8px 12px;border-radius:8px;border:2px solid var(--bd);background:var(--c2);color:var(--t1);font-size:13px;min-width:110px;outline:none;-webkit-appearance:none}.qc select:focus{border-color:var(--tl)}
.wb{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding:12px;background:var(--c2);border:1px dashed var(--bd2);border-radius:12px}.wc{padding:8px 14px;border-radius:10px;background:var(--c1);border:1px solid var(--bd);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;user-select:none}.wc:active{transform:scale(.95)}.wc.us{opacity:.25;pointer-events:none}.wc.pl{background:var(--tlb);border-color:var(--tl);color:var(--tl2)}
.dz{display:inline-block;min-width:80px;padding:4px 10px;border:2px dashed var(--bd2);border-radius:8px;color:var(--t4);font-size:13px;cursor:pointer;transition:.15s;margin:0 2px;vertical-align:baseline}.dz.fd{border-color:var(--tl);background:var(--tlb);color:var(--tl2);border-style:solid}.dz.ok{border-color:var(--tl);background:var(--tlb);color:var(--tl2);border-style:solid}.dz.no{border-color:var(--rd);background:var(--rdb);color:var(--rd);border-style:solid}
.sm{width:100%;padding:14px;border:none;border-radius:12px;background:var(--tl);color:#fff;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(42,191,172,.25)}.sm:disabled{opacity:.35}
.fb{border-radius:12px;padding:16px;margin-bottom:12px}.fb.ok{background:var(--tlb);border:1px solid rgba(42,191,172,.25)}.fb.no{background:var(--rdb);border:1px solid rgba(224,90,90,.2)}.fb .ft2{font-weight:700;font-size:14px;margin-bottom:6px}.fb .fa{font-size:12px;color:var(--t2);margin-bottom:6px}.fb .fr{font-size:12px;font-weight:700;color:var(--am);margin-top:8px}.fb .fe{font-size:13px;color:var(--t2);line-height:1.8}.fb .fs{margin-top:8px;font-size:11px;padding:6px 10px;border-radius:8px;background:var(--amb);color:var(--am);font-weight:600}
.rb{background:var(--rdb);border:1px solid rgba(224,90,90,.2);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px}.rb .ri{font-size:20px}.rb .rx{font-size:12px;font-weight:600;color:var(--rd);flex:1}
.nb{display:inline-flex;align-items:center;gap:4px;padding:7px 16px;border-radius:10px;border:1px solid var(--bd);background:var(--c1);color:var(--t3);font-size:11px;font-weight:600;margin-bottom:16px}
.seq-prog{display:flex;align-items:center;gap:4px;margin-bottom:14px}.seq-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--bd2);flex-shrink:0}.seq-dot.done{background:var(--tl);border-color:var(--tl)}.seq-dot.cur{border-color:var(--tl);background:var(--tlb)}.seq-line{flex:1;height:2px;background:var(--bd)}.seq-line.done{background:var(--tl)}
.wm{text-align:center;margin-top:32px;opacity:.3;font-size:10px;color:var(--t5);letter-spacing:.1em;text-transform:uppercase}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .2s ease}
</style>

<script>

// TOPICS & SUBSKILLS DATA

const T={
tenses:{id:"tenses",title:"Tenses",icon:"\u23F3",desc:"Verb tenses, modals, perfect forms",subs:{
"t-sp":{title:"Simple Present vs Continuous",rule:"Simple Present = habits, facts. Continuous = temporary, now.",pos:"V1(+s/es) vs am/is/are+V-ing",exs:["She works at a bank.","She is working from home this week."],trap:{w:"I am knowing the answer.",r:"I know the answer.",y:"Stative verb."}},
"t-past":{title:"Simple Past vs Past Continuous",rule:"SP = completed. PC = background/interrupted.",pos:"V2 vs was/were+V-ing",exs:["The experiment failed.","They were analyzing when power went out."],trap:{w:"When he arrived, she cooked.",r:"When he arrived, she was cooking.",y:"In progress."}},
"t-pp":{title:"Present Perfect vs Simple Past",rule:"SP = specific time. PP = connects to now.",pos:"V2 vs have/has+V3. since/for = PP.",exs:["She visited in 2019.","She has visited three times."],trap:{w:"I have seen it last night.",r:"I saw it last night.",y:"Specific time = SP."}},
"t-ppast":{title:"Past Perfect vs Simple Past",rule:"PP = earlier of two past events.",pos:"had+V3 (earlier) vs V2 (later).",exs:["The train had left when we arrived."],trap:{w:"She never saw snow before she moved.",r:"She had never seen snow before she moved.",y:"Earlier = PP."}},
"t-fut":{title:"Will vs Going To vs Pres Cont",rule:"Will = spontaneous. Going to = planned. PC = fixed.",pos:"will+V1 / going to+V1 / V-ing+time",exs:["I will help.","I am meeting her at 3."],trap:{w:"Look, it will rain!",r:"Look, it is going to rain!",y:"Evidence = going to."}},
"t-mod":{title:"Modals + Base Form",rule:"After modals, ALWAYS base V1.",pos:"modal+V1. modal+have+V3.",exs:["She can speak French.","He should have finished."],trap:{w:"She can speaks.",r:"She can speak.",y:"No conjugation after modal."}},
"t-perf":{title:"Have/Has/Had + V3",rule:"After have/has/had = always V3.",pos:"have/has+V3. had+V3.",exs:["The committee has approved it."],trap:{w:"She has went.",r:"She has gone.",y:"went=V2, gone=V3."}},
"t-svf":{title:"Do/Does + Base Verb",rule:"After does/doesn't, main verb stays BASE.",pos:"does+V1 / doesn't+V1.",exs:["The policy doesn't apply."],trap:{w:"He doesn't eats.",r:"He doesn't eat.",y:"Doesn't carries conjugation."}},
"t-hto":{title:"Has to / Have to",rule:"Have to follows SVA. Must never changes.",pos:"Singular=has to. Plural=have to.",exs:["Every employee has to complete it."],trap:{w:"Each candidate have to submit.",r:"Each candidate has to submit.",y:"Singular=has to."}},
"t-irr":{title:"Irregular Past Tense",rule:"Past same for all subjects. No -ed for irregulars.",pos:"go=went, think=thought, know=knew.",exs:["The researchers found differences."],trap:{w:"They thinked carefully.",r:"They thought carefully.",y:"think=thought."}}
}},
articles:{id:"articles",title:"Articles",icon:"\uD83D\uDCCE",desc:"A, An, The, Zero article rules",subs:{
"a-basic":{title:"A / An / The / Zero",rule:"A/An = non-specific. The = specific. Zero = general.",pos:"A+consonant sound. An+vowel sound.",exs:["A university.","An hour.","Water is essential."],trap:{w:"She is a honest person.",r:"She is an honest person.",y:"Vowel sound = an."}},
"a-the":{title:"When to Use The",rule:"The for: second mention, unique, superlatives, specific.",pos:"The+superlative. The+of. The+ordinal.",exs:["The sun.","The results of the study."],trap:{w:"He wants to become the engineer.",r:"He wants to become an engineer.",y:"Non-specific = a/an."}},
"a-zero":{title:"Zero Article Rules",rule:"No article: uncountable general, plural general, languages, meals.",pos:"No article + general noun.",exs:["Education is important.","Dogs are loyal."],trap:{w:"The water is essential for life.",r:"Water is essential for life.",y:"General = zero."}}
}},
sva:{id:"sva",title:"Subject-Verb Agreement",icon:"\uD83D\uDD17",desc:"Singular/plural matching, tricky subjects",subs:{
"s-core":{title:"Core SVA Rules",rule:"Singular = singular verb. Plural = plural. Ignore prep phrases.",pos:"List of items IS. Results of study SHOW.",exs:["The quality of products has improved."],trap:{w:"The group of students were late.",r:"The group of students was late.",y:"Group = subject."}},
"s-tricky":{title:"Neither/Nor, Each, Every",rule:"Nor = nearest subject. Each/every = singular.",pos:"Neither A nor B = verb matches B.",exs:["Neither teacher nor students were present."],trap:{w:"Each of the boys have finished.",r:"Each of the boys has finished.",y:"Each = singular."}},
"s-there":{title:"There is/are",rule:"There/here: verb agrees with real subject after it.",pos:"There is+singular. There are+plural.",exs:["There are several reasons."],trap:{w:"There is many problems.",r:"There are many problems.",y:"Problems = plural."}}
}},
preps:{id:"preps",title:"Prepositions",icon:"\uD83C\uDFF7\uFE0F",desc:"Fixed pairs, gerund after prep, time/place",subs:{
"p-ger":{title:"Preposition + Gerund",rule:"After prepositions, verbs take -ing form.",pos:"prep+V-ing. Look forward to meeting.",exs:["Thanks for helping.","I look forward to meeting you."],trap:{w:"I look forward to meet you.",r:"I look forward to meeting you.",y:"To = prep here."}},
"p-fix":{title:"Fixed Verb/Adj + Prep",rule:"Certain verbs/adj always take specific prepositions.",pos:"depend ON, consist OF, interested IN.",exs:["Success depends on preparation."],trap:{w:"She is responsible of the project.",r:"She is responsible for the project.",y:"Responsible for."}},
"p-time":{title:"Time & Place Prepositions",rule:"At = specific time. On = days. In = months/years.",pos:"at 5PM, on Monday, in July.",exs:["The meeting is at 3 PM on Friday."],trap:{w:"I will see you in Monday.",r:"I will see you on Monday.",y:"Days = on."}}
}},
passive:{id:"passive",title:"Active & Passive Voice",icon:"\uD83D\uDD04",desc:"be + V3, passive across tenses",subs:{
"v-basic":{title:"Basic Passive: be + V3",rule:"Passive = subject receives action. be + V3.",pos:"is/are/was/were + V3.",exs:["The report was submitted.","Policies are being implemented."],trap:{w:"The building built in 1990.",r:"The building was built in 1990.",y:"Missing be."}},
"v-tense":{title:"Passive Across Tenses",rule:"Match be to tense: is done, was done, has been done, will be done.",pos:"Pres=is+V3. Past=was+V3. PP=has been+V3.",exs:["Data is collected monthly.","Results have been published."],trap:{w:"The report has been wrote.",r:"The report has been written.",y:"wrote=V2, written=V3."}},
"v-modal":{title:"Passive with Modals",rule:"modal + be + V3.",pos:"must be done, can be seen, could have been prevented.",exs:["The issue must be addressed.","Errors could have been prevented."],trap:{w:"This can solved easily.",r:"This can be solved easily.",y:"Need be between modal and V3."}}
}},
gerinf:{id:"gerinf",title:"Gerunds & Infinitives",icon:"\uD83D\uDD24",desc:"When to use -ing vs to + verb",subs:{
"g-after":{title:"Verbs + Gerund vs Infinitive",rule:"Some verbs take gerund (enjoy, avoid, suggest). Some take infinitive (want, decide, agree).",pos:"enjoy+V-ing. want+to V.",exs:["She enjoys reading.","They decided to postpone."],trap:{w:"He avoided to answer.",r:"He avoided answering.",y:"Avoid takes gerund."}},
"g-meaning":{title:"Meaning Change: stop, remember, try",rule:"stop doing=quit. stop to do=pause. remember doing=recall. remember to do=don't forget.",pos:"stop+V-ing vs stop+to V.",exs:["She stopped smoking. (quit)","She stopped to smoke. (paused)"],trap:{w:"I remember to lock the door. (meaning recall)",r:"I remember locking the door.",y:"Recall = gerund."}},
"g-prep":{title:"Preposition + Gerund in Context",rule:"After all prepositions, use gerund. committed to, capable of, in addition to.",pos:"prep+V-ing always.",exs:["She is capable of managing teams."],trap:{w:"He is committed to reduce.",r:"He is committed to reducing.",y:"To = prep here."}}
}},
cond:{id:"cond",title:"Conditionals",icon:"\uD83D\uDD00",desc:"Zero, first, second, third conditional",subs:{
"c-zero":{title:"Zero Conditional (Facts)",rule:"If + present, present. General truths.",pos:"If+V1, V1.",exs:["If you heat water, it boils."],trap:{w:"If water is heated, it will boil.",r:"If water is heated, it boils.",y:"Fact = zero, not first."}},
"c-first":{title:"First Conditional (Real Future)",rule:"If + present, will + V1. Likely future.",pos:"If+V1, will+V1.",exs:["If it rains, we will cancel."],trap:{w:"If it will rain, we stay.",r:"If it rains, we will stay.",y:"No will after if."}},
"c-second":{title:"Second Conditional (Unreal Present)",rule:"If + past, would + V1. Hypothetical.",pos:"If+V2, would+V1.",exs:["If I had time, I would travel."],trap:{w:"If I would have time, I would travel.",r:"If I had time, I would travel.",y:"No would after if."}},
"c-third":{title:"Third Conditional (Unreal Past)",rule:"If + had + V3, would have + V3. Didn't happen.",pos:"If+had+V3, would/could have+V3.",exs:["If they had invested, they would have profited."],trap:{w:"If they would have known, they would have acted.",r:"If they had known, they would have acted.",y:"No would have after if."}}
}}
};
const TO=["tenses","articles","sva","preps","passive","gerinf","cond"];
function gS(tid){return Object.keys(T[tid].subs)}
function gSk(tid,sid){return T[tid]?.subs?.[sid]}
function allSL(){const r=[];TO.forEach(tid=>{gS(tid).forEach(sid=>{r.push({tid,sid})})});return r}

const L1=[
// TENSES (27)
{id:"L1t01",ty:"dd",tid:"tenses",sid:"t-sp",p:"The university currently ___1___ over 40,000 students and ___2___ plans to expand.",b:[{id:"b1",o:["enrolls","is enrolling","enrolled","has enrolled"],c:1,l:"___1___"},{id:"b2",o:["has","is having","had","have"],c:0,l:"___2___"}],x:{b1:"General fact = SP.",b2:"Possession = has."},r:"Facts = SP."},
{id:"L1t02",ty:"dd",tid:"tenses",sid:"t-past",p:"While the researcher ___1___ results, her colleague ___2___ an anomaly.",b:[{id:"b1",o:["reviewed","was reviewing","had reviewed","has reviewed"],c:1,l:"___1___"},{id:"b2",o:["was discovering","discovered","had discovered","discovers"],c:1,l:"___2___"}],x:{b1:"While = background = PC.",b2:"Interruption = SP."},r:"While+PC. Interrupt=SP."},
{id:"L1t03",ty:"dd",tid:"tenses",sid:"t-pp",p:"Climate change ___1___ a concern since the 1990s. Agreements ___2___ in response.",b:[{id:"b1",o:["was","has been","had been","is being"],c:1,l:"___1___"},{id:"b2",o:["were signed","have been signed","had signed","are signing"],c:1,l:"___2___"}],x:{b1:"Since = PP.",b2:"Still relevant = PP passive."},r:"Since = PP."},
{id:"L1t04",ty:"dd",tid:"tenses",sid:"t-ppast",p:"By the time the team ___1___ funding, the deadline ___2___ already passed.",b:[{id:"b1",o:["secured","had secured","has secured","secures"],c:0,l:"___1___"},{id:"b2",o:["has","have","had","was"],c:2,l:"___2___"}],x:{b1:"Later event = SP.",b2:"Earlier = PP: had."},r:"Earlier = Past Perfect."},
{id:"L1t05",ty:"dd",tid:"tenses",sid:"t-fut",p:"The government ___1___ a plan next month. The date ___2___ been confirmed.",b:[{id:"b1",o:["will launch","is launching","launches","launched"],c:1,l:"___1___"},{id:"b2",o:["has","had","is","will"],c:0,l:"___2___"}],x:{b1:"Confirmed = fixed = PC.",b2:"PP: has been confirmed."},r:"Fixed = PC for future."},
{id:"L1t06",ty:"dd",tid:"tenses",sid:"t-mod",p:"Applicants ___1___ provide valid ID. Those who fail ___2___ be disqualified.",b:[{id:"b1",o:["must","musts","must to","must be"],c:0,l:"___1___"},{id:"b2",o:["will","shall be","will to","are"],c:0,l:"___2___"}],x:{b1:"Modal + base.",b2:"Will + base."},r:"Modal + base V1."},
{id:"L1t07",ty:"dd",tid:"tenses",sid:"t-perf",p:"Researchers have ___1___ extensive work and have ___2___ that deforestation is accelerating.",b:[{id:"b1",o:["conduct","conducted","conducting","conducts"],c:1,l:"___1___"},{id:"b2",o:["find","found","finding","finds"],c:1,l:"___2___"}],x:{b1:"have + V3.",b2:"have + V3: found."},r:"After have = V3."},
{id:"L1t08",ty:"dd",tid:"tenses",sid:"t-svf",p:"The regulation ___1___ not require disclosure, but it ___2___ mandate reporting.",b:[{id:"b1",o:["do","does","is","has"],c:1,l:"___1___"},{id:"b2",o:["do","does","is","has"],c:1,l:"___2___"}],x:{b1:"Singular = does.",b2:"Same = does."},r:"Singular = does."},
{id:"L1t09",ty:"dd",tid:"tenses",sid:"t-hto",p:"Each head ___1___ to submit reviews, while all staff ___2___ to complete assessments.",b:[{id:"b1",o:["have","has","had","having"],c:1,l:"___1___"},{id:"b2",o:["have","has","had","having"],c:0,l:"___2___"}],x:{b1:"Singular = has to.",b2:"Plural = have to."},r:"has to (sing) vs have to (pl)."},
{id:"L1t10",ty:"dd",tid:"tenses",sid:"t-irr",p:"The committee ___1___ to revise guidelines after members ___2___ concerns.",b:[{id:"b1",o:["chose","choosed","has chosen","choosing"],c:0,l:"___1___"},{id:"b2",o:["raised","rised","have raised","raising"],c:0,l:"___2___"}],x:{b1:"choose=chose.",b2:"raise=raised."},r:"Irregular past."},

const SK="gf8";
function ld(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}}
function sv(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch{}}
let st=ld();
if(!st.l1)st.l1={};if(!st.l2)st.l2={};if(!st.kb)st.kb={};if(!st.l2w)st.l2w=[];
L1.forEach(q=>{if(!st.l1[q.id])st.l1[q.id]="new"});
L2.forEach(q=>{if(!st.l2[q.id])st.l2[q.id]="new"});
allSL().forEach(({tid,sid})=>{if(st.kb[tid+"/"+sid]===undefined)st.kb[tid+"/"+sid]=false});
sv(st);

let S={v:"main",mt:"topics",tid:null,qi:0,ql:[],ans:{},sub:false,sw:null,kbi:0,pFrom:"topic",
  l2i:0,l2list:[],l2ans:{},l2sub:false,l2sw:null,l2blocked:false,l2weakSids:[]};

// Helpers
function l1cts(tid){let n=0,p=0,l=0;const qs=tid?L1.filter(q=>q.tid===tid):L1;qs.forEach(q=>{const s=st.l1[q.id];if(s==="new")n++;else if(s==="practice")p++;else l++});return{n,p,l,t:qs.length}}
function l2cts(){let n=0,p=0,l=0;L2.forEach(q=>{const s=st.l2[q.id];if(s==="new")n++;else if(s==="practice")p++;else l++});return{n,p,l,t:L2.length}}
function subKBDone(tid,sid){return st.kb[tid+"/"+sid]===true}
function subL1Done(tid,sid){const qs=L1.filter(q=>q.tid===tid&&q.sid===sid);return qs.length>0&&qs.every(q=>st.l1[q.id]==="learned")}
function subDone(tid,sid){return subKBDone(tid,sid)&&subL1Done(tid,sid)}
function topicPct(tid){const subs=gS(tid);if(!subs.length)return 0;return Math.round((subs.filter(s=>subDone(tid,s)).length/subs.length)*100)}
function topicKBPct(tid){const subs=gS(tid);if(!subs.length)return 0;return Math.round((subs.filter(s=>subKBDone(tid,s)).length/subs.length)*100)}
function overallPct(){const all=allSL();if(!all.length)return{done:0,total:0,pct:0};const done=all.filter(({tid,sid})=>subDone(tid,sid)).length;return{done,total:all.length,pct:Math.round((done/all.length)*100)}}
function nextKBI(tid){const subs=gS(tid);for(let i=0;i<subs.length;i++){if(!st.kb[tid+"/"+subs[i]])return i}return subs.length}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function R(){
  const a=document.getElementById("app");let h="";
  if(S.v==="main")h=rMain();
  else if(S.v==="topic")h=rTopic();
  else if(S.v==="kb")h=rKB();
  else if(S.v==="prac")h=rPrac();
  else if(S.v==="l2")h=rL2();
  else if(S.v==="l2relearn")h=rL2Relearn();
  h+=`<div class="wm">Pearson Test of English \xb7 Grammar Practice</div>`;
  a.innerHTML=h;
  document.querySelectorAll(".ds").forEach(s=>{s.addEventListener("change",e=>{
    if(S.v==="l2")S.l2ans[e.target.dataset.b]=parseInt(e.target.value);
    else S.ans[e.target.dataset.b]=parseInt(e.target.value);
  })});
}

  h+=`<div class="tabs"><button class="${S.mt==="topics"?"on":""}" onclick="S.mt='topics';R()">📚 Grammar Topics</button><button class="${S.mt==="qbank"?"on":""}" onclick="S.mt='qbank';R()">✏️ Question Bank</button></div>`;
  if(S.mt==="topics"){
    TO.forEach(tid=>{
      const t=T[tid];const subs=gS(tid);const pct=topicPct(tid);const c=l1cts(tid);
      const kbD=subs.filter(s=>subKBDone(tid,s)).length;const subD=subs.filter(s=>subDone(tid,s)).length;
      h+=`<div class="ti" onclick="S.tid='${tid}';S.v='topic';R()"><div class="tp"><span class="ico">${t.icon}</span><span class="tit">${t.title}</span><span class="st" style="background:${pct===100?"var(--tlb)":pct>0?"var(--amb)":"var(--prb)"};color:${pct===100?"var(--tl)":pct>0?"var(--am)":"var(--pr)"}">${pct===100?"\u2713 Done":pct>0?pct+"%":"New"}</span></div><div class="mt">${subs.length} sub-skills \xb7 KB: ${kbD}/${subs.length} \xb7 FIB: ${c.l}/${c.t}</div><div class="pr"><div class="pb" style="flex:1"><div class="fl" style="width:${pct}%;background:var(--tl)"></div></div><span class="pc" style="color:${pct>=80?"var(--tl)":pct>0?"var(--am)":"var(--t5)"}">${pct}%</span></div></div>`;
    });
  }else{
    // Question Bank
    const lc2=l2cts();const qPct=lc2.t>0?Math.round((lc2.l/lc2.t)*100):0;
    h+=`<div class="cd"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;font-weight:700">Question Bank</span><span style="font-size:14px;font-weight:800;font-family:var(--m);color:${qPct>=80?"var(--tl)":qPct>0?"var(--am)":"var(--t4)"}">${qPct}%</span></div><div class="pb"><div class="fl" style="width:${qPct}%;background:var(--tl)"></div></div><div style="font-size:11px;color:var(--t4);margin-top:6px">${lc2.l}/${lc2.t} learned \xb7 ${lc2.p} practice \xb7 ${lc2.n} new</div></div>`;
    h+=`<div style="font-size:12px;color:var(--t3);margin-bottom:14px;line-height:1.6">Mixed questions across all grammar topics. Random order. If you make a mistake, you must relearn the relevant sub-topic before continuing.</div>`;
    h+=`<button class="sm" onclick="startL2()">Start Question Bank</button>`;
    if(st.l2w&&st.l2w.length>0){
      h+=`<div class="rb" style="margin-top:12px"><span class="ri">📖</span><span class="rx">${st.l2w.length} sub-topic${st.l2w.length>1?"s":""} need relearning</span><button onclick="S.l2weakSids=[...st.l2w];S.v='l2relearn';R()">Relearn Now</button></div>`;
    }
  }
  h+=`<div style="text-align:center;margin-top:16px"><button onclick="if(confirm('Reset all progress?')){st={l1:{},l2:{},kb:{},l2w:[]};L1.forEach(q=>st.l1[q.id]='new');L2.forEach(q=>st.l2[q.id]='new');allSL().forEach(({tid,sid})=>{st.kb[tid+'/'+sid]=false});sv(st);R()}" style="background:none;border:none;color:var(--t5);font-size:10px;text-decoration:underline;cursor:pointer">Reset progress</button></div></div>`;
  return h;
}

// ── TOPIC ──
function rTopic(){
  const t=T[S.tid];const subs=gS(S.tid);const c=l1cts(S.tid);const pct=topicPct(S.tid);
  const kbD=subs.filter(s=>subKBDone(S.tid,s)).length;const nxt=nextKBI(S.tid);const allKB=nxt>=subs.length;
  let h=`<div class="fi"><button class="nb" onclick="S.v='main';R()">\u2190 Topics</button>`;
  h+=`<div class="hdr"><div class="lb">PTE Preparation</div><h1>${t.icon} ${t.title}</h1></div>`;
  h+=`<div class="cts"><div class="ct"><div class="n" style="color:var(--pr)">${c.n}</div><div class="l">New</div></div><div class="ct"><div class="n" style="color:var(--am)">${c.p}</div><div class="l">Practice</div></div><div class="ct"><div class="n" style="color:var(--tl)">${c.l}</div><div class="l">Learned</div></div><div class="ct"><div class="n" style="color:var(--t2)">${c.t}</div><div class="l">Total</div></div></div>`;
  h+=`<div class="pb" style="margin-bottom:10px"><div class="fl" style="width:${pct}%;background:var(--tl)"></div></div>`;
  h+=`<div style="font-size:11px;color:var(--t4);margin-bottom:14px">KB: ${kbD}/${subs.length} \xb7 FIB: ${c.l}/${c.t} \xb7 ${pct}% mastery</div>`;
  h+=`<div class="ar">`;
  if(allKB)h+=`<button class="ab at" style="opacity:.6" disabled>\u2713 KB Complete</button>`;
  else h+=`<button class="ab at" onclick="S.kbi=${nxt};S.v='kb';R()">📚 Learn Next (${kbD+1}/${subs.length})</button>`;
  h+=`<button class="ab ao" onclick="startL1()">✏️ Fill in Blanks</button></div>`;
  h+=`<div style="font-size:14px;font-weight:700;margin-bottom:10px">Sub-topics (${subs.length})</div>`;
  subs.forEach((sid,i)=>{
    const sk=gSk(S.tid,sid);const kbOk=subKBDone(S.tid,sid);const fibOk=subL1Done(S.tid,sid);const full=kbOk&&fibOk;
    const qs=L1.filter(q=>q.tid===S.tid&&q.sid===sid);const learned=qs.filter(q=>st.l1[q.id]==="learned").length;
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--c1);border:1px solid ${full?"var(--tl)":"var(--bd)"};border-radius:12px;margin-bottom:6px;${full?"border-left:4px solid var(--tl)":""}">`;
    h+=`<span style="font-size:13px;font-weight:800;color:${full?"var(--tl)":i<nxt?"var(--am)":"var(--t5)"};font-family:var(--m);width:24px">${full?"\u2713":(i+1)}</span>`;
    h+=`<div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--t2)">${sk.title}</div>`;
    h+=`<div style="font-size:10px;color:var(--t4);margin-top:2px">KB: ${kbOk?"\u2713":"\u2014"} \xb7 FIB: ${learned}/${qs.length}</div></div></div>`;
  });
  h+=`</div>`;return h;
}

// ── KB (Sequential) ──
function rKB(){
  const t=T[S.tid];const subs=gS(S.tid);const idx=S.kbi;const sid=subs[idx];const sk=gSk(S.tid,sid);
  if(!sk){S.v="topic";R();return""}
  let h=`<div class="fi"><button class="nb" onclick="S.v='topic';R()">\u2190 Back</button>`;
  h+=`<div style="font-size:18px;font-weight:700;margin-bottom:6px">📚 Knowledge Bank</div>`;
  h+=`<div style="font-size:12px;color:var(--t4);margin-bottom:14px">${t.title} \xb7 ${idx+1} of ${subs.length}</div>`;
  h+=`<div class="seq-prog">`;
  subs.forEach((s,i)=>{if(i>0)h+=`<div class="seq-line ${i<=idx?"done":""}"></div>`;h+=`<div class="seq-dot ${subKBDone(S.tid,s)?"done":i===idx?"cur":""}"></div>`});
  h+=`</div>`;
  h+=`<div class="kc"><h3>${sk.title} <span class="bg">${t.title}</span></h3><p>${sk.rule}</p><div class="po">Structure</div><div class="pv">${sk.pos}</div><div class="el">Examples</div>`;
  sk.exs.forEach(e=>{h+=`<div class="ex">"${e}"</div>`});
  if(sk.trap){h+=`<div class="tl2">\u26A0\uFE0F PTE Trap</div><div class="trp"><div class="wr">\u2717 ${sk.trap.w}</div><div class="rt">\u2713 ${sk.trap.r}</div><div class="wy">${sk.trap.y}</div></div>`}
  h+=`</div>`;
  const done=subKBDone(S.tid,sid);
  if(done){h+=`<div style="background:var(--tlb);border:1px solid rgba(42,191,172,.25);border-radius:12px;padding:12px;text-align:center;margin-bottom:12px"><span style="color:var(--tl);font-weight:700;font-size:13px">\u2713 Completed</span></div>`;
    if(idx<subs.length-1)h+=`<button class="sm" onclick="S.kbi=${idx+1};R();window.scrollTo({top:0,behavior:'smooth'})">Next \u2192</button>`;
    else h+=`<button class="sm" onclick="S.v='topic';R()">\u2713 All Done</button>`;
  }else{
    h+=`<button class="sm" onclick="markKB('${S.tid}','${sid}',${idx})">\u2713 Completed - I have learned this</button>`;
  }
  h+=`</div>`;return h;
}
function markKB(tid,sid,idx){st.kb[tid+"/"+sid]=true;sv(st);const subs=gS(tid);if(idx<subs.length-1){S.kbi=idx+1;R();window.scrollTo({top:0,behavior:"smooth"})}else{S.v="topic";R()}}

// ── L1 PRACTICE ──
function startL1(){
  const qs=[...L1.filter(q=>q.tid===S.tid)].sort((a,b)=>{const o={new:0,practice:1,learned:2};return(o[st.l1[a.id]]||0)-(o[st.l1[b.id]]||0)});
  S.ql=qs;S.qi=0;S.ans={};S.sub=false;S.sw=null;S.pFrom="topic";S.v="prac";R();
}
function rPrac(){
  if(!S.ql.length)return"No questions.";
  const q=S.ql[S.qi];const tot=S.ql.length;const s=st.l1[q.id];
  let h=`<div class="fi"><button class="nb" onclick="goBackL1()">\u2190 Back</button>`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;font-family:var(--m);color:var(--t4)">Q ${S.qi+1}/${tot}</span><span style="font-size:10px;padding:2px 8px;border-radius:8px;background:${s==="new"?"var(--prb)":s==="practice"?"var(--amb)":"var(--tlb)"};color:${s==="new"?"var(--pr)":s==="practice"?"var(--am)":"var(--tl)"};font-weight:600">${s.toUpperCase()}</span></div>`;
  h+=`<div class="pb" style="margin-bottom:12px"><div class="fl" style="width:${((S.qi+1)/tot)*100}%;background:var(--tl)"></div></div>`;
  h+=`<div class="qc"><div class="qh"><span class="qt" style="color:${q.ty==="dd"?"var(--bl)":"var(--tl)"};background:${q.ty==="dd"?"rgba(74,144,217,.1)":"var(--tlb)"}">${q.ty==="dd"?"DROPDOWN":"DRAG & DROP"}</span><span class="qn">${gSk(q.tid,q.sid)?.title.split(" ").slice(0,3).join(" ")||""}</span></div>`;
  h+=renderQ(q,S.ans,S.sub,S.sw,"l1");
  h+=`</div>`;
  if(!S.sub)h+=`<button class="sm" onclick="subL1()">Submit Answer</button>`;
  else{h+=renderFB(q,S.ans,"l1");h+=`<button class="sm" style="margin-top:8px" onclick="nxL1()">${S.qi<tot-1?"Next \u2192":"Done"}</button>`}
  h+=`</div>`;return h;
}
function goBackL1(){S.v="topic";R()}
function subL1(){const q=S.ql[S.qi];S.sub=true;st.l1[q.id]=isCorrect(q,S.ans)?"learned":"practice";sv(st);R()}
function nxL1(){if(S.qi<S.ql.length-1){S.qi++;S.ans={};S.sub=false;S.sw=null;R();window.scrollTo({top:0,behavior:"smooth"})}else{S.v="topic";R()}}

// ── L2 QUESTION BANK ──
function startL2(){
  // Check if blocked
  if(st.l2w&&st.l2w.length>0){S.l2weakSids=[...st.l2w];S.v="l2relearn";R();return}
  const qs=shuffle(L2).sort((a,b)=>{const o={new:0,practice:1,learned:2};return(o[st.l2[a.id]]||0)-(o[st.l2[b.id]]||0)});
  S.l2list=qs;S.l2i=0;S.l2ans={};S.l2sub=false;S.l2sw=null;S.v="l2";R();
}
function rL2(){
  if(!S.l2list.length)return"No questions.";
  const q=S.l2list[S.l2i];const tot=S.l2list.length;const s=st.l2[q.id];
  let h=`<div class="fi"><button class="nb" onclick="S.v='main';S.mt='qbank';R()">\u2190 Back</button>`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:12px;font-family:var(--m);color:var(--t4)">Q ${S.l2i+1}/${tot}</span><span style="font-size:10px;padding:2px 8px;border-radius:8px;background:${s==="new"?"var(--prb)":s==="practice"?"var(--amb)":"var(--tlb)"};color:${s==="new"?"var(--pr)":s==="practice"?"var(--am)":"var(--tl)"};font-weight:600">${s.toUpperCase()}</span></div>`;
  h+=`<div class="pb" style="margin-bottom:12px"><div class="fl" style="width:${((S.l2i+1)/tot)*100}%;background:var(--tl)"></div></div>`;
  h+=`<div class="qc"><div class="qh"><span class="qt" style="color:var(--bl);background:rgba(74,144,217,.1)">QUESTION BANK</span><span class="qn">Q${S.l2i+1}</span></div>`;
  h+=renderQ(q,S.l2ans,S.l2sub,S.l2sw,"l2");
  h+=`</div>`;
  if(!S.l2sub)h+=`<button class="sm" onclick="subL2()">Submit Answer</button>`;
  else{h+=renderFB(q,S.l2ans,"l2");
    if(st.l2w&&st.l2w.length>0){
      h+=`<div class="rb" style="margin-top:8px"><span class="ri">\uD83D\uDCD6</span><span class="rx">You must relearn ${st.l2w.length} sub-topic${st.l2w.length>1?"s":""} before continuing.</span></div>`;
      h+=`<button class="sm" style="margin-top:8px;background:var(--am)" onclick="S.l2weakSids=[...st.l2w];S.v='l2relearn';R()">Relearn Now</button>`;
    }else{
      h+=`<button class="sm" style="margin-top:8px" onclick="nxL2()">${S.l2i<tot-1?"Next \u2192":"Done"}</button>`;
    }
  }
  h+=`</div>`;return h;
}
function subL2(){
  const q=S.l2list[S.l2i];S.l2sub=true;
  const ok=isCorrect(q,S.l2ans);
  st.l2[q.id]=ok?"learned":"practice";
  if(!ok&&q.sids){
    // Add weak sids
    q.sids.forEach(sid=>{if(!st.l2w.includes(sid))st.l2w.push(sid)});
  }
  sv(st);R();
}
function nxL2(){if(S.l2i<S.l2list.length-1){S.l2i++;S.l2ans={};S.l2sub=false;S.l2sw=null;R();window.scrollTo({top:0,behavior:"smooth"})}else{S.v="main";S.mt="qbank";R()}}

// ── L2 RELEARN ──
function rL2Relearn(){
  let h=`<div class="fi"><button class="nb" onclick="S.v='main';S.mt='qbank';R()">\u2190 Back</button>`;
  h+=`<div class="rb"><span class="ri">\uD83D\uDCD6</span><span class="rx">Relearn these sub-topics before continuing the Question Bank</span></div>`;
  h+=`<div style="font-size:18px;font-weight:700;margin-bottom:12px">Relearn Required</div>`;
  S.l2weakSids.forEach(sid=>{
    // Find which topic this sid belongs to
    let foundTid=null;TO.forEach(tid=>{if(T[tid].subs[sid])foundTid=tid});
    if(!foundTid)return;
    const sk=gSk(foundTid,sid);if(!sk)return;
    h+=`<div class="kc"><h3>${sk.title} <span class="bg">${T[foundTid].title}</span></h3><p>${sk.rule}</p><div class="po">Structure</div><div class="pv">${sk.pos}</div><div class="el">Examples</div>`;
    sk.exs.forEach(e=>{h+=`<div class="ex">"${e}"</div>`});
    if(sk.trap){h+=`<div class="tl2">\u26A0\uFE0F PTE Trap</div><div class="trp"><div class="wr">\u2717 ${sk.trap.w}</div><div class="rt">\u2713 ${sk.trap.r}</div><div class="wy">${sk.trap.y}</div></div>`}
    h+=`</div>`;
  });
  h+=`<button class="sm" onclick="clearL2Weak()">\u2713 I have relearned these - Continue</button></div>`;
  return h;
}
function clearL2Weak(){st.l2w=[];sv(st);startL2()}

// ══════════════════════════════════════════════════════════════
// SHARED Q RENDERING
// ══════════════════════════════════════════════════════════════
function renderQ(q,ans,submitted,selWord,level){
  if(q.ty==="dd")return rDD(q,ans,submitted);
  return rDG(q,ans,submitted,selWord,level);
}
function rDD(q,ans,sub){let p=q.p;q.b.forEach(b=>{if(sub){const sel=ans[b.id];const ok=sel===b.c;p=p.replace(b.l,`<span class="dz ${ok?"ok":"no"}">${b.o[sel!==undefined?sel:0]}</span>`)}else{let opts=`<option value="-1" ${ans[b.id]===undefined?"selected":""}>Select...</option>`;b.o.forEach((o,i)=>{opts+=`<option value="${i}" ${ans[b.id]===i?"selected":""}>${o}</option>`});p=p.replace(b.l,`<select class="ds" data-b="${b.id}">${opts}</select>`)}});return`<div class="ps">${p}</div>`}
function rDG(q,ans,sub,sw,level){let p=q.p;const ua=ans||{};q.bl.forEach((cw,i)=>{const bid="B"+(i+1);const pl=ua[bid];if(sub){const ok=pl&&pl.toLowerCase()===cw.toLowerCase();p=p.replace("_"+bid+"_",`<span class="dz ${ok?"ok":"no"}">${pl||"___"}</span>`)}else{p=p.replace("_"+bid+"_",`<span class="dz ${pl?"fd":""}" onclick="${level==="l2"?"pwL2":"pw"}('${bid}')">${pl||"tap"}</span>`)}});let h=`<div class="ps">${p}</div>`;if(!sub){h+=`<div class="wb">`;q.bk.forEach(w=>{const us=Object.values(ua).includes(w);const curSw=level==="l2"?S.l2sw:S.sw;h+=`<span class="wc ${us?"us":""} ${curSw===w?"pl":""}" onclick="${level==="l2"?"selWL2":"selW"}('${w.replace(/'/g,"\\'")}')">${w}</span>`});h+=`</div>`}return h}

function renderFB(q,ans,level){
  let ok=isCorrect(q,ans);let h="";
  if(q.ty==="dd"){
    if(ok){h+=`<div class="fb ok"><div class="ft2" style="color:var(--tl)">\u2713 Correct!</div><div class="fe">${typeof q.x==="string"?q.x:Object.values(q.x).join(" ")}</div></div>`}
    else{h+=`<div class="fb no"><div class="ft2" style="color:var(--rd)">\u2717 Not quite right</div>`;
      q.b.forEach(b=>{if(ans[b.id]!==b.c){const sel=ans[b.id];h+=`<div class="fa">${b.l}: "<span style="color:var(--rd)">${b.o[sel!==undefined?sel:0]||"none"}</span>" \u2192 "<span style="color:var(--tl)">${b.o[b.c]}</span>"</div><div class="fe">${q.x[b.id]||""}</div>`}});
      h+=`<div class="fr">\uD83D\uDCCF ${q.r}</div>`;
      if(q.sids){h+=`<div class="fs">\uD83D\uDCD6 Review: ${q.sids.map(sid=>{let n="";TO.forEach(tid=>{if(T[tid].subs[sid])n=T[tid].subs[sid].title});return n}).join(", ")}</div>`}
      else if(q.sid){h+=`<div class="fs">\uD83D\uDCD6 Review: ${gSk(q.tid,q.sid)?.title||""}</div>`}
      h+=`</div>`}
  }else{
    if(ok){h+=`<div class="fb ok"><div class="ft2" style="color:var(--tl)">\u2713 Correct!</div><div class="fe">${q.x}</div></div>`}
    else{h+=`<div class="fb no"><div class="ft2" style="color:var(--rd)">\u2717 Not quite right</div>`;
      q.bl.forEach((cw,i)=>{const bid="B"+(i+1);const pl=ans[bid];if(!pl||pl.toLowerCase()!==cw.toLowerCase())h+=`<div class="fa">Blank ${i+1}: "<span style="color:var(--rd)">${pl||"empty"}</span>" \u2192 "<span style="color:var(--tl)">${cw}</span>"</div>`});
      h+=`<div class="fe" style="margin-top:8px">${q.x}</div><div class="fr">\uD83D\uDCCF ${q.r}</div>`;
      if(q.sids){h+=`<div class="fs">\uD83D\uDCD6 Review: ${q.sids.map(sid=>{let n="";TO.forEach(tid=>{if(T[tid].subs[sid])n=T[tid].subs[sid].title});return n}).join(", ")}</div>`}
      else if(q.sid){h+=`<div class="fs">\uD83D\uDCD6 Review: ${gSk(q.tid,q.sid)?.title||""}</div>`}
      h+=`</div>`}
  }
  return h;
}

function isCorrect(q,ans){
  if(q.ty==="dd"){let ok=true;q.b.forEach(b=>{if(ans[b.id]!==b.c)ok=false});return ok}
  let ok=true;q.bl.forEach((cw,i)=>{const bid="B"+(i+1);if(!ans[bid]||ans[bid].toLowerCase()!==cw.toLowerCase())ok=false});return ok;
}

// L1 word interactions
function selW(w){if(S.sub)return;if(S.sw===w){S.sw=null;R();return}Object.keys(S.ans).forEach(k=>{if(S.ans[k]===w)delete S.ans[k]});S.sw=w;R()}
function pw(bid){if(S.sub)return;if(S.sw){Object.keys(S.ans).forEach(k=>{if(S.ans[k]===S.sw)delete S.ans[k]});S.ans[bid]=S.sw;S.sw=null;R()}else if(S.ans[bid]){delete S.ans[bid];R()}}
// L2 word interactions
function selWL2(w){if(S.l2sub)return;if(S.l2sw===w){S.l2sw=null;R();return}Object.keys(S.l2ans).forEach(k=>{if(S.l2ans[k]===w)delete S.l2ans[k]});S.l2sw=w;R()}
function pwL2(bid){if(S.l2sub)return;if(S.l2sw){Object.keys(S.l2ans).forEach(k=>{if(S.l2ans[k]===S.l2sw)delete S.l2ans[k]});S.l2ans[bid]=S.l2sw;S.l2sw=null;R()}else if(S.l2ans[bid]){delete S.l2ans[bid];R()}}

R();
</script>
