<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>GrammarForge · PTE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F7FA;--surface:#FFFFFF;--card:#FFFFFF;--border:#E2E8F0;--borderActive:#00C9B6;--primary:#364395;--success:#008B5D;--successBg:rgba(0,139,93,0.1);--error:#D32F2F;--errorBg:rgba(211,47,47,0.08);--warning:#ED6B06;--warningBg:rgba(237,107,6,0.08);--text:#1A202C;--textSec:#4A5568;--textMuted:#718096;--accent:#00C9B6;--accentBg:rgba(0,201,182,0.08);--magenta:#9D1348}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
input,textarea,button,select{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.app{max-width:460px;margin:0 auto;padding-bottom:80px}
.header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.header-label{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.15em;margin-bottom:4px}
.header h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text)}

.kpi-row{display:flex;gap:8px;padding:16px 20px 8px}
.kpi-card{flex:1;padding:14px 10px;background:var(--card);border-radius:14px;border:1px solid var(--border);display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.kpi-val{font-size:22px;font-weight:700;line-height:1}
.kpi-label{font-size:10px;font-weight:600;color:var(--textMuted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

.bucket-row{display:flex;gap:6px;padding:0 20px 4px}
.bucket-stat{flex:1;padding:8px 4px;background:var(--card);border-radius:10px;border:1px solid var(--border);text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.bucket-val{font-size:17px;font-weight:700}
.bucket-label{font-size:9px;font-weight:600;color:var(--textMuted);text-transform:uppercase;letter-spacing:.04em}

.progress-bar{height:6px;border-radius:3px;background:#E2E8F0;overflow:hidden;display:flex}
.progress-fill{background:var(--success);transition:width .5s}
.progress-fill-warn{background:var(--warning);transition:width .5s}

.main-tabs{display:flex;gap:4px;background:var(--surface);border-radius:14px;margin:0 16px;padding:5px;margin-bottom:8px}
.main-tab{flex:1;padding:10px 4px;border-radius:11px;border:none;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .2s;background:transparent;color:var(--textMuted)}
.main-tab.active{background:linear-gradient(135deg,#364395,#00C9B6);color:#fff}

.topic-card{background:var(--card);border-radius:16px;border:1.5px solid var(--border);padding:18px;margin:0 16px 12px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:.15s}
.topic-card:active{border-color:var(--accent)}
.topic-card.done{border-color:var(--success)}

.sub-item{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.sub-item.done{border-color:var(--success)}

.kb-card{background:var(--card);border-radius:14px;border:1px solid var(--border);border-left:4px solid var(--accent);padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}

.rule-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.rule-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px}
.rule-eg{font-size:11px;color:var(--accent);font-style:italic}

.trap-card{background:var(--errorBg);border:1px solid rgba(211,47,47,.15);border-radius:10px;padding:10px 12px;margin-bottom:6px}

.q-card{background:var(--card);border-radius:16px;border:1.5px solid var(--border);padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:12px}
.q-passage{font-size:16px;line-height:1.8;color:var(--text);margin-bottom:20px}
.q-select{padding:8px 12px;border-radius:8px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;min-width:110px;outline:none;-webkit-appearance:none}
.q-select:focus{border-color:var(--accent)}

.blank-zone{display:inline-block;min-width:90px;padding:4px 12px;border:2px dashed var(--border);border-radius:8px;text-align:center;font-weight:700;color:var(--textMuted);font-size:14px;cursor:pointer;margin:0 2px;vertical-align:baseline;transition:.15s}
.blank-zone.filled{border-color:var(--accent);color:var(--accent);background:var(--accentBg);border-style:solid}
.blank-zone.correct{border-color:var(--success);color:var(--success);background:var(--successBg);border-style:solid}
.blank-zone.wrong{border-color:var(--error);color:var(--error);background:var(--errorBg);border-style:solid}

.word-bank{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;padding:12px;background:var(--bg);border:1px dashed var(--border);border-radius:12px}
.word-chip{padding:10px 18px;border-radius:10px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:.15s;user-select:none}
.word-chip:active{transform:scale(.95)}
.word-chip.used{opacity:.2;pointer-events:none}
.word-chip.selected{border-color:var(--accent);background:var(--accentBg);color:var(--accent)}

.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#364395,#00C9B6);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(54,67,149,.3)}
.btn-primary:disabled{opacity:.35}
.btn-relearn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#9D1348,#ED6B06);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.btn-back{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--textMuted);font-size:13px;cursor:pointer;margin-bottom:14px}

.fb-card{border-radius:12px;padding:16px;margin-bottom:12px}
.fb-card.correct{background:var(--successBg);border:1px solid rgba(0,139,93,.2)}
.fb-card.wrong{background:var(--errorBg);border:1px solid rgba(211,47,47,.2)}

.error-banner{background:var(--errorBg);border:1px solid rgba(211,47,47,.15);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.error-pill{font-size:12px;font-weight:600;color:var(--error);background:rgba(211,47,47,.08);padding:3px 10px;border-radius:6px;display:inline-block;margin:2px}

.relearn-card{background:var(--card);border-radius:16px;border:2px solid var(--magenta);padding:20px;margin-top:16px;box-shadow:0 4px 20px rgba(157,19,72,.15)}

.seq-prog{display:flex;align-items:center;gap:4px;margin-bottom:14px}
.seq-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}
.seq-dot.done{background:var(--success);border-color:var(--success)}
.seq-dot.cur{border-color:var(--accent);background:var(--accentBg)}
.seq-line{flex:1;height:2px;background:var(--border)}
.seq-line.done{background:var(--success)}

.wm{text-align:center;margin-top:32px;opacity:.3;font-size:10px;color:var(--textMuted);letter-spacing:.1em;text-transform:uppercase;padding-bottom:20px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>

// ══════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════
const T={
tenses:{id:"tenses",title:"Tenses",icon:"\u23F3",desc:"Verb tenses, modals, perfect forms",subs:{
"t-sp":{title:"Simple Present vs Continuous",rule:"Simple Present = habits, facts, routines, general truths, permanent states. Present Continuous = temporary situations, actions happening right now, changing/evolving situations.",pos:"SP: Subject + V1(+s/es). PC: Subject + am/is/are + V-ing.",
exs:["She works at a bank. (permanent fact)","She is working from home this week. (temporary)","Water boils at 100C. (scientific fact = SP)","The company is expanding into Asia this year. (current change)"],
notes:[
"WHEN TO USE SIMPLE PRESENT",
"Habits and routines | Facts and general truths | Permanent states | Timetables and schedules",
"1. Habits and routines: things you do regularly.",
"She WORKS every day. | He PLAYS football on weekends. | I DRINK coffee every morning.",
"2. Facts and general truths: things that are always true.",
"The sun RISES in the east. | Water BOILS at 100C. | The Earth REVOLVES around the sun.",
"3. Permanent states: situations that do not change.",
"She LIVES in London. | He OWNS three companies. | This building BELONGS to the university.",
"4. Timetables and schedules (even for future events).",
"The train LEAVES at 6 PM. | The class STARTS at 9 AM. | The store OPENS at 10.",
"WHEN TO USE PRESENT CONTINUOUS",
"Actions happening NOW | Temporary situations | Changing/evolving trends | Fixed future plans",
"5. Actions happening NOW, at this moment.",
"She IS WRITING an email right now. | They ARE DISCUSSING the proposal.",
"6. Temporary situations (not permanent).",
"She IS WORKING from home this week. | I AM STAYING with friends until I find a flat.",
"7. Changing or evolving situations and trends.",
"The climate IS GETTING warmer. | Prices ARE INCREASING rapidly. | Technology IS CHANGING everything.",
"8. Fixed future arrangements (with specific time).",
"I AM MEETING the client at 3 PM tomorrow. | They ARE FLYING to London next week.",
"SIGNAL WORDS - memorize these!",
"SP: always, usually, often, sometimes, rarely, never, every day/week/year, generally, normally",
"PC: now, right now, currently, at the moment, at present, this week/month/year, today, these days",
"(empty line)",
"STATIVE VERBS - NEVER use continuous form",
"believe, know, understand, want, need, like, love, hate, prefer, own, belong, mean, consist, seem, appear, realize",
"WRONG: I am believing you. | RIGHT: I believe you.",
"WRONG: She is owning a car. | RIGHT: She owns a car.",
"COMMON PTE MISTAKES",
"Using continuous for stative verbs | Using SP for temporary situations | Confusing PC future with will",
"PTE FIB TIP: If the passage talks about a general fact or statistic = SP. If it says currently/this year = PC.",
"Example: The economy currently EMPLOYS 200M people (fact=SP) but IS EXPERIENCING a slowdown (temporary=PC)."
],
trap:{w:"I am knowing the answer.",r:"I know the answer.",y:"Know is a stative verb - never takes continuous form. Stative verbs describe states, not actions."}},

"t-past":{title:"Simple Past vs Past Continuous",rule:"Simple Past = completed action at a known time. Past Continuous = background/ongoing action, often interrupted by another event.",pos:"SP: Subject + V2. PC: Subject + was/were + V-ing.",
exs:["The experiment failed. (completed)","They were analyzing data when the power went out. (background + interruption)","While she was cooking, the phone rang. (two past actions)"],
notes:[
"WHEN TO USE SIMPLE PAST",
"Completed actions at a specific time | Sequential past events | Past habits (used to)",
"1. Completed actions at a specific time in the past.",
"He WENT to school yesterday. | She GRADUATED in 2018. | The company LAUNCHED the product last year.",
"2. Sequential past events (one after another).",
"She OPENED the door, WALKED in, and SAT down. | He ARRIVED, CHECKED in, and WENT to his room.",
"3. Past habits (can also use 'used to').",
"When I was young, I PLAYED outside every day. | She WORKED at Google for five years.",
"WHEN TO USE PAST CONTINUOUS",
"Background action when interrupted | Two simultaneous past actions | Setting the scene in a story",
"4. Background action interrupted by another event.",
"She WAS READING when the phone RANG. | While I WAS WALKING, it started to rain.",
"5. Two simultaneous past actions (both ongoing).",
"While I WAS STUDYING, my brother WAS PLAYING guitar. | She WAS COOKING while he WAS CLEANING.",
"6. Setting the scene or providing context in a story.",
"The sun WAS SHINING and birds WERE SINGING when we arrived. | It WAS RAINING heavily that evening.",
"KEY PATTERN: While + Past Continuous, Simple Past (interruption)",
"WHILE she WAS COOKING, the fire alarm WENT off. | WHILE they WERE DISCUSSING, the CEO ARRIVED.",
"SIGNAL WORDS",
"SP: yesterday, last week/month/year, ago, in 2019, at that time, then, when",
"PC: while, when (+ was/were), as, at that moment, all day/evening",
"COMMON PTE MISTAKES",
"Using SP when the action was in progress | Forgetting that while signals PC | Both verbs in same tense when they should differ",
"PTE FIB TIP: Look for WHILE in the passage - it almost always signals Past Continuous.",
"If a sentence starts after a comma following WHILE, the tense can change from PC to SP (the interruption)."
],
trap:{w:"When he arrived, she cooked dinner.",r:"When he arrived, she was cooking dinner.",y:"Cooking was in progress when he arrived = Past Continuous. The arrival interrupted the cooking."}},

"t-pp":{title:"Present Perfect vs Simple Past",rule:"Simple Past = specific finished time in the past. Present Perfect = past action connects to now, time not specified. Use PP for achievements, life experience, progress, results, and ongoing situations.",pos:"SP: Subject + V2. PP: Subject + have/has + V3.",
exs:["She visited Japan in 2019. (specific time = SP)","She has visited Japan three times. (life experience = PP)","I have finished my homework. (result connects to now = PP)","The government introduced the policy in 2010. (specific year = SP)"],
notes:[
"WHEN TO USE SIMPLE PAST",
"Specific finished time | Named dates/periods | Completed events with no present connection",
"1. Action at a SPECIFIC time in the past.",
"I SAW him yesterday. | She GRADUATED in 2018. | They MOVED to Melbourne last year.",
"2. Named dates, periods, or time markers.",
"In 2010, the government INTRODUCED reforms. | Last month, sales DROPPED by 15%.",
"3. Completed events with no present connection.",
"Shakespeare WROTE many plays. | The dinosaurs DIED millions of years ago.",
"WHEN TO USE PRESENT PERFECT",
"Achievements and results | Life experience | Progress and change | Ongoing situations (since/for)",
"4. Achievements and results that matter NOW.",
"The company HAS EXPANDED to 30 countries. | She HAS PUBLISHED four research papers.",
"5. Life experience (time not specified).",
"I HAVE VISITED Paris twice. | Have you EVER EATEN sushi? | She HAS NEVER seen snow.",
"6. Progress and change over time.",
"Technology HAS CHANGED dramatically. | The population HAS GROWN significantly.",
"7. Ongoing situations with SINCE or FOR.",
"She HAS LIVED here SINCE 2015. | They HAVE WORKED together FOR ten years.",
"SIGNAL WORDS - THIS IS THE #1 PTE TENSE TRAP",
"SP signals: yesterday, last week, ago, in 2019, at that time, when I was young, then",
"PP signals: already, just, yet, ever, never, since, for, recently, so far, up to now, this week/year",
"THE GOLDEN RULE: If you see SINCE or FOR = ALWAYS Present Perfect",
"WRONG: I lived here since 2015. | RIGHT: I HAVE LIVED here since 2015.",
"THE GOLDEN RULE: If you see a specific past time = ALWAYS Simple Past",
"WRONG: I have seen him yesterday. | RIGHT: I SAW him yesterday.",
"COMMON PTE MISTAKES",
"Using PP with specific past time | Using SP with since/for | Confusing V2 with V3 for irregular verbs",
"PTE FIB TIP: Scan for time markers FIRST. Since/for/ever/never = PP. Yesterday/in 2019/ago = SP.",
"Remember: PP connects past to present. SP is finished and done."
],
trap:{w:"I have seen that movie last night.",r:"I saw that movie last night.",y:"'Last night' = specific time = Simple Past only. Present Perfect never takes specific past time markers."}},

"t-ppast":{title:"Past Perfect vs Simple Past",rule:"Past Perfect = the earlier of two past events. Simple Past = the later event. Think: the past before the past. You need TWO past events to use Past Perfect.",pos:"Earlier event: had + V3. Later event: V2. Keywords: by the time, before, after, already.",
exs:["The train had left when we arrived.","By the time funding arrived, the project had been cancelled.","She had completed the report before the meeting started."],
notes:[
"WHEN TO USE PAST PERFECT",
"Earlier of two past events | Actions completed before a past deadline | Background information in past narratives",
"1. The EARLIER of two past events takes Past Perfect.",
"She HAD LEFT before I arrived. (leaving=earlier, arriving=later) | He HAD EATEN before she cooked.",
"2. The LATER event takes Simple Past.",
"When I arrived, she HAD ALREADY LEFT. | After he HAD FINISHED, he went home.",
"3. With BY THE TIME: the event before 'by the time' = Past Perfect.",
"BY THE TIME the report WAS published, the committee HAD reviewed three drafts.",
"4. With BEFORE: the event before 'before' = Past Perfect.",
"The species HAD DISAPPEARED before conservation BEGAN. | She HAD SAVED enough before she QUIT.",
"5. With AFTER: the event after 'after' = Past Perfect (it happened first).",
"AFTER the team HAD COMPLETED the analysis, they SUBMITTED the report.",
"WHEN NOT TO USE PAST PERFECT",
"Single past event = Simple Past only. Past Perfect needs TWO past events to compare.",
"6. If only ONE past event, just use Simple Past.",
"She went home. (one event = SP) | He arrived at 5. (one event = SP)",
"7. If events are in chronological order and clear, SP for both is acceptable.",
"She opened the door, walked in, and sat down. (clear sequence = all SP)",
"SIGNAL WORDS",
"by the time, before, after, already (+ had), never...before, when (+ had), until, by then",
"COMMON PTE MISTAKES",
"Using SP for both events when one is clearly earlier | Using had without a second past event | Confusing had+V2 with had+V3",
"PTE FIB TIP: Look for BY THE TIME or BEFORE in the passage. The clause with these usually needs had+V3.",
"Remember: Past Perfect is the PAST of the PAST. It always needs another past event as reference."
],
trap:{w:"She never saw snow before she moved to Canada.",r:"She had never seen snow before she moved to Canada.",y:"Seeing snow = earlier event = Past Perfect. Moving = later event = Simple Past."}},

"t-fut":{title:"Will vs Going To vs Pres Continuous",rule:"Will = spontaneous decisions, general predictions, promises. Going to = pre-planned actions, evidence-based predictions. Present Continuous = fixed arrangements with specific time/date.",pos:"will + V1 | am/is/are going to + V1 | am/is/are + V-ing + future time",
exs:["I will help you. (spontaneous)","Look at those clouds - it is going to rain! (evidence)","I am meeting Sarah at 3 PM tomorrow. (fixed)","The company is going to launch a new product. (planned)"],
notes:[
"WHEN TO USE WILL",
"Spontaneous decisions | General predictions | Promises and offers | Facts about the future",
"1. Spontaneous decisions made at the moment of speaking.",
"The phone is ringing. I WILL answer it. | OK, I WILL help you with that.",
"2. General predictions without evidence.",
"I think the economy WILL recover. | She WILL probably pass the exam.",
"3. Promises and offers.",
"I WILL call you tomorrow. | We WILL not let you down.",
"4. Facts about the future that are certain.",
"The sun WILL rise at 6:12 AM tomorrow. | She WILL turn 30 next month.",
"WHEN TO USE GOING TO",
"Pre-planned intentions | Predictions based on visible evidence",
"5. Pre-planned intentions (decided BEFORE the moment of speaking).",
"I AM GOING TO study medicine. (already decided) | They ARE GOING TO move to Sydney.",
"6. Predictions based on visible or current evidence.",
"Look at those clouds - it IS GOING TO rain! | She is very talented - she IS GOING TO succeed.",
"WHEN TO USE PRESENT CONTINUOUS (for future)",
"Fixed arrangements with specific time/date/place",
"7. Fixed arrangements already confirmed with others.",
"I AM MEETING the client at 3 PM. | She IS FLYING to London on Friday. | We ARE HAVING dinner at the new restaurant tonight.",
"KEY DIFFERENCES - the exam LOVES testing these",
"Evidence visible NOW = going to. | No evidence, just opinion = will. | Confirmed appointment/booking = Present Continuous.",
"SIGNAL WORDS",
"will: I think, probably, perhaps, definitely, certainly, in my opinion",
"going to: plan, intend, look (evidence), watch out, clearly",
"PC future: tomorrow at, next Monday, this evening, on Friday, at 3 PM",
"COMMON PTE MISTAKES",
"Using will when there is visible evidence | Using going to for spontaneous decisions | Using will for fixed arrangements",
"PTE FIB TIP: If the passage mentions a confirmed date/appointment = Present Continuous. If evidence = going to.",
"Watch for: The delegation IS MEETING (fixed) vs The delegation WILL meet (prediction)."
],
trap:{w:"Look at those clouds - it will rain!",r:"Look at those clouds - it is going to rain!",y:"Visible evidence (clouds) = going to. Will is for predictions without evidence."}},

"t-mod":{title:"Modals + Base Form",rule:"After ANY modal verb, ALWAYS use base form V1. Modals never change form. Never add -s, -ed, or -ing to the main verb after a modal. SVA does not apply after modals.",pos:"modal + V1 | modal + have + V3 (past) | modal + be + V-ing (continuous) | modal + be + V3 (passive)",
exs:["She can speak French.","He should have finished by now.","The issue must be addressed. (passive)","They could be working late. (continuous)"],
notes:[
"THE 9 MODAL VERBS - memorize all of them",
"can, could, will, would, shall, should, may, might, must",
"RULE 1: After ANY modal = ALWAYS base form V1",
"She CAN speak. (not speaks) | He MUST go. (not goes) | They WILL arrive. (not arrives)",
"RULE 2: Modals NEVER change form for any subject",
"I can, you can, he can, she can, they can, we can. (NEVER 'cans' or 'coulds')",
"RULE 3: SVA does NOT apply after modals",
"She MUST complete it. (not completes) | He WILL go. (not goes) | It SHOULD work. (not works)",
"MODAL COMBINATIONS - what follows each pattern",
"modal + V1 = present/future ability, permission, obligation, prediction",
"can swim, must leave, will arrive, should study, may come, might rain",
"modal + have + V3 = past deduction, regret, unrealized possibility",
"should HAVE finished, could HAVE won, must HAVE been, might HAVE left, would HAVE helped",
"modal + be + V-ing = ongoing action with modal meaning",
"could BE WORKING, must BE SLEEPING, might BE WAITING, should BE STUDYING",
"modal + be + V3 = passive voice with modal",
"must BE addressed, can BE solved, should BE reviewed, will BE completed",
"SEMI-MODALS (behave like modals but can change form)",
"ought to, have to, need to, used to, dare to, be able to, be going to",
"COMMON PTE MISTAKES",
"Adding -s after modal | Using to after modal (except ought to) | Forgetting base form after modal",
"WRONG: She can speaks. | She must to go. | He will goes. | They should studies.",
"RIGHT: She can speak. | She must go. | He will go. | They should study.",
"PTE FIB TIP: If you see a modal in the passage, the next verb MUST be base form. No exceptions.",
"Also: modal + have + V3 appears often for third conditional and past regrets in PTE passages."
],
trap:{w:"She can speaks three languages.",r:"She can speak three languages.",y:"After any modal = base form only. Never add -s, -ed, or -ing."}},

"t-perf":{title:"Have/Has/Had + V3",rule:"After have/has/had, ALWAYS use past participle V3. The biggest PTE trap: picking V2 (past simple) instead of V3 (past participle) for irregular verbs where V2 and V3 are different.",pos:"have/has + V3 = Present Perfect | had + V3 = Past Perfect | have been + V3 = PP Passive",
exs:["The committee has approved the proposal.","She had never seen such results before.","Ocean temperatures have risen steadily.","The report has been submitted."],
notes:[
"THE CORE RULE: After have/has/had = ALWAYS V3",
"This is non-negotiable. V3 = past participle. Not V1 (base), not V2 (past simple).",
"REGULAR VERBS: V2 = V3 (both end in -ed). No confusion.",
"play: played(V2) = played(V3) | work: worked(V2) = worked(V3) | complete: completed = completed",
"IRREGULAR VERBS: V2 and V3 are DIFFERENT. This is the trap.",
"go: went(V2) vs GONE(V3) | write: wrote(V2) vs WRITTEN(V3) | see: saw(V2) vs SEEN(V3)",
"WRONG: She has went. | RIGHT: She has GONE. (went=V2, gone=V3)",
"WRONG: They have wrote. | RIGHT: They have WRITTEN. (wrote=V2, written=V3)",
"WRONG: I have saw. | RIGHT: I have SEEN. (saw=V2, seen=V3)",
"COMMON V2 vs V3 PAIRS YOU MUST MEMORIZE",
"go: went/gone | write: wrote/written | see: saw/seen | take: took/taken | give: gave/given",
"speak: spoke/spoken | break: broke/broken | choose: chose/chosen | drive: drove/driven | eat: ate/eaten",
"fall: fell/fallen | rise: rose/risen | grow: grew/grown | know: knew/known | throw: threw/thrown",
"begin: began/begun | drink: drank/drunk | sing: sang/sung | swim: swam/swum | ring: rang/rung",
"WHERE V3 APPEARS IN PTE",
"have/has + V3 = Present Perfect: She HAS completed the project.",
"had + V3 = Past Perfect: She HAD completed it before the deadline.",
"have/has been + V3 = PP Passive: The report HAS BEEN published.",
"had been + V3 = Past Perfect Passive: The data HAD BEEN collected.",
"will have + V3 = Future Perfect: By Friday, she WILL HAVE finished.",
"PTE FIB TIP: When you see have/has/had in a blank, look at the next word.",
"If the next word is V2 for an irregular verb, it is WRONG. You need V3.",
"Quick check: go=gone, write=written, see=seen, take=taken, speak=spoken, rise=risen, grow=grown."
],
trap:{w:"She has went to the market.",r:"She has gone to the market.",y:"went = V2 (Simple Past form). gone = V3 (Past Participle). After has/have/had = always V3."}},

"t-svf":{title:"Do/Does/Doesn't + Base Verb",rule:"When an auxiliary verb (do/does/did/doesn't/didn't) is present, the main verb stays in BASE form (V1). Only the auxiliary carries tense and agreement. Never conjugate the main verb.",pos:"does/doesn't + V1 | did/didn't + V1 | do/don't + V1",
exs:["The policy doesn't apply to small businesses.","Does the population matter?","She didn't go home early.","The regulation does not require disclosure."],
notes:[
"THE CORE PRINCIPLE",
"In any clause, only ONE verb shows tense or agreement. The auxiliary carries grammar, main verb stays base.",
"RULE 1: does/doesn't + main verb = BASE FORM",
"WRONG: He doesn't eats. | RIGHT: He doesn't EAT.",
"WRONG: She doesn't goes. | RIGHT: She doesn't GO.",
"WRONG: It doesn't requires. | RIGHT: It doesn't REQUIRE.",
"RULE 2: did/didn't + main verb = BASE FORM",
"WRONG: Did he went? | RIGHT: Did he GO?",
"WRONG: She didn't bought. | RIGHT: She didn't BUY.",
"WRONG: They didn't completed. | RIGHT: They didn't COMPLETE.",
"RULE 3: do/don't + main verb = BASE FORM",
"WRONG: They don't likes coffee. | RIGHT: They don't LIKE coffee.",
"RULE 4: WITHOUT auxiliary = main verb carries the agreement",
"She LIKES coffee. (no auxiliary = add -s) | He GOES to work. (no auxiliary = add -es)",
"Compare: She DOES like coffee. (auxiliary present = base form 'like')",
"HOW TO IDENTIFY THIS IN PTE FIB",
"If you see does/doesn't/did/didn't before a blank, the answer is ALWAYS base form V1.",
"If there is NO auxiliary, the verb itself must agree with the subject (add -s for singular).",
"SHORTCUT: If do/does/did is present, don't add -s or -ed to the main verb.",
"Only one verb in a clause should carry the grammar load.",
"COMMON PTE MISTAKES",
"Adding -s to main verb when does is present | Adding -ed when did is present | Double marking tense",
"PTE FIB TIP: The regulation DOES NOT require (not requires). Why DOES the population matter (not matters).",
"If you see DOES + blank = answer is base form. If you see DID + blank = answer is base form."
],
trap:{w:"He doesn't eats breakfast.",r:"He doesn't eat breakfast.",y:"Doesn't already carries the conjugation. Main verb must stay in base form. Never double-mark."}},

"t-hto":{title:"Has to / Have to vs Must",rule:"Have to follows SVA: has to for 3rd person singular, have to for plural and I/you. Must NEVER changes form. Both express obligation but must = internal, have to = external.",pos:"he/she/it/each/every = has to + V1 | they/we/I/you = have to + V1 | must + V1 (all subjects)",
exs:["Every employee has to complete training.","All participants have to register.","Students must submit assignments by Friday.","She had to leave early yesterday. (past)"],
notes:[
"HAVE TO = follows Subject-Verb Agreement",
"Singular 3rd person (he, she, it, each, every, the system) = HAS TO + V1.",
"Each candidate HAS TO submit references. | The system HAS TO be updated. | Every student HAS TO attend.",
"Plural (they, we) + I + you = HAVE TO + V1.",
"All staff HAVE TO attend. | I HAVE TO finish this. | You HAVE TO register. | We HAVE TO comply.",
"MUST = never changes form for any subject",
"She MUST comply. | They MUST comply. | I MUST comply. | He MUST attend. (always MUST, never MUSTS)",
"KEY DIFFERENCE: MUST vs HAVE TO",
"Must = internal obligation (personal belief, strong recommendation).",
"Have to = external obligation (rules, laws, someone else requires it).",
"You MUST be honest. (my belief) | You HAVE TO wear a uniform. (company rule)",
"You MUST try this restaurant. (strong recommendation) | You HAVE TO pass the exam to graduate. (requirement)",
"PAST FORMS",
"Have to in past = HAD TO. | Must has NO past form.",
"She HAD TO leave early yesterday. (not 'musted') | They HAD TO cancel the event.",
"NEGATIVE FORMS - meaning changes!",
"Don't have to = not necessary (optional). | Must not = forbidden (prohibited).",
"You DON'T HAVE TO come. (it's optional) | You MUST NOT smoke here. (it's forbidden)",
"COMMON PTE MISTAKES",
"Using have to with singular subjects | Using has to with plural | Writing musts",
"PTE FIB TIP: Check the subject. Each/every/the system = singular = HAS TO. All/students/they = HAVE TO.",
"Also: must + base verb always. Never must to, musts, or must + V-ing."
],
trap:{w:"Each candidate have to submit references.",r:"Each candidate has to submit references.",y:"Each = singular = has to. Not have to. SVA applies to have/has, not to must."}},

"t-irr":{title:"Irregular Past Tense",rule:"Irregular verbs do NOT follow the -ed pattern. Their past forms must be memorized. Past tense is the same for ALL subjects. V2 (past simple) is often different from V3 (past participle).",pos:"Base(V1) = Past(V2) = Past Participle(V3). Regular: play/played/played. Irregular: go/went/gone.",
exs:["The researchers found significant differences.","The government sought to address the issue.","The author wrote the manuscript in three months.","The committee chose a new approach."],
notes:[
"REGULAR vs IRREGULAR",
"Regular: add -ed for both V2 and V3. work=worked=worked. play=played=played.",
"Irregular: change form unpredictably. go=went=gone. write=wrote=written. Must memorize.",
"VERB FORMS EXPLAINED",
"V1 (Base): I go, she writes, they speak. Used in present simple and after modals.",
"V2 (Past Simple): I went, she wrote, they spoke. Used for past tense.",
"V3 (Past Participle): gone, written, spoken. Used after have/has/had and in passive voice.",
"TOP PTE IRREGULAR VERBS - GROUP 1: V2 and V3 are DIFFERENT",
"go: went / gone | write: wrote / written | see: saw / seen | take: took / taken | give: gave / given",
"speak: spoke / spoken | break: broke / broken | choose: chose / chosen | drive: drove / driven",
"eat: ate / eaten | fall: fell / fallen | rise: rose / risen | grow: grew / grown | know: knew / known",
"begin: began / begun | drink: drank / drunk | throw: threw / thrown | swim: swam / swum",
"TOP PTE IRREGULAR VERBS - GROUP 2: V2 and V3 are the SAME",
"make: made / made | find: found / found | think: thought / thought | bring: brought / brought",
"buy: bought / bought | catch: caught / caught | feel: felt / felt | keep: kept / kept",
"lead: led / led | leave: left / left | lose: lost / lost | meet: met / met | pay: paid / paid",
"say: said / said | sell: sold / sold | send: sent / sent | sit: sat / sat | sleep: slept / slept",
"spend: spent / spent | stand: stood / stood | teach: taught / taught | tell: told / told | win: won / won",
"TOP PTE IRREGULAR VERBS - GROUP 3: All three forms are the SAME",
"cut: cut / cut | hit: hit / hit | hurt: hurt / hurt | put: put / put | read: read / read (pronunciation changes!)",
"COMMON PTE TRAPS",
"Adding -ed to irregular verbs | Confusing V2 with V3 after have/has | Not recognizing irregular forms",
"WRONG: thinked | RIGHT: thought. WRONG: choosed | RIGHT: chose. WRONG: writed | RIGHT: wrote.",
"WRONG: has went | RIGHT: has gone. WRONG: have wrote | RIGHT: have written.",
"PTE FIB TIP: Past tense is the SAME for all subjects.",
"I went. She went. They went. (never 'wented' or 'goed'). | I thought. She thought. (never 'thinked').",
"When you see a blank after had/has/have, you need V3. When you see a past-tense passage, you need V2."
],
trap:{w:"They thinked carefully about the proposal.",r:"They thought carefully about the proposal.",y:"think = thought (irregular). Never 'thinked'. Past tense of irregular verbs must be memorized."}}
}},
articles:{id:"articles",title:"Articles",icon:"\uD83D\uDCCE",desc:"A, An, The, Zero article rules",subs:{
"a-basic":{title:"A / An / The / Zero",rule:"A/An = non-specific, first-time mention. The = specific, known to reader. Zero = general concepts. Choice of a/an depends on SOUND, not spelling.",pos:"A + consonant sound. An + vowel sound. The + specific noun. Zero + general/uncountable.",
exs:["A university. (starts with /j/ consonant sound)","An hour. (silent h, starts with vowel sound)","An honest man. (silent h = vowel sound)","Water is essential. (general = zero)"],
notes:[
"1. A = before consonant SOUNDS. An = before vowel SOUNDS.",
"A car. A user (/j/ sound). A European (/j/ sound). | An apple. An hour. An MBA (/em/ sound).",
"2. A/An = non-specific, mentioned for first time. You do not know which one.",
"I saw A cat. | He bought A car. | She is AN engineer.",
"3. The = specific, already known, or mentioned before.",
"I saw a cat. THE cat was black. | THE results of the study confirmed it.",
"4. Zero article = no article before general/abstract/uncountable nouns.",
"Education is important. | Water is essential. | Dogs are loyal.",
"5. Countable nouns = can count (1,2,3), can use a/an, have plural form.",
"An apple, two apples. | A book, many books. | Use: many, few, several.",
"6. Uncountable nouns = cannot count, NO a/an, NO plural, always singular verb.",
"Water, information, advice, furniture, news, money, research, knowledge.",
"7. Quick test: Can I say 'one ___' or 'two ___s'? YES = countable. NO = uncountable.",
"One apple (countable). | One water? No (uncountable). One furniture? No (uncountable)."
],
trap:{w:"She is a honest person.",r:"She is an honest person.",y:"Silent h = vowel sound = an. It is about SOUND, not spelling."}},

"a-the":{title:"When to Use The",rule:"Use 'the' for: specific/known nouns, second mention, unique things (sun, moon, internet), superlatives, ordinals, of-phrases, rivers, oceans, mountain ranges, and proper noun groups.",pos:"The + superlative. The + of-phrase. The + unique. The + second mention.",
exs:["The sun rises in the east.","She is the tallest in class.","The results of the study were clear.","The United States. The Himalayas. The Amazon River."],
notes:[
"1. Use THE when both speaker and listener know WHICH ONE.",
"Pass me THE salt. (we both see it) | THE meeting is at 3. (we both know which one)",
"2. Use THE for second mention (first time = a/an, second time = the).",
"I saw A dog. THE dog was friendly.",
"3. Use THE for unique/one-of-a-kind things.",
"THE sun. THE moon. THE internet. THE sky. THE earth. THE government (of our country).",
"4. Use THE before superlatives and ordinals.",
"She is THE fastest runner. | He was THE first to arrive.",
"5. Use THE before of-phrases that specify.",
"THE results OF the study. | THE advancement OF technology. | THE quality OF products.",
"6. Proper nouns that NEED 'the': groups, rivers, oceans, ranges, deserts, plural countries.",
"THE United States. THE Netherlands. THE Himalayas. THE Nile. THE Indian Ocean. THE Sahara.",
"7. Proper nouns with NO 'the': single countries, cities, people, universities, companies.",
"India (not the India). Melbourne. Google. Harvard University. Mount Everest.",
"8. THE before specific institutions when context makes them definite.",
"THE government announced it. | THE university revised its policy."
],
trap:{w:"He wants to become the engineer.",r:"He wants to become an engineer.",y:"Non-specific profession = a/an, not the. He does not mean a specific engineer."}},

"a-zero":{title:"Zero Article Rules",rule:"No article before: uncountable nouns in general, plural nouns in general, languages, meals, sports, academic subjects, proper nouns. If speaking about the concept in general, drop the article.",pos:"Zero + general uncountable. Zero + general plural. Zero + languages/meals/sports.",
exs:["Education is important. (general concept)","Dogs are loyal. (all dogs in general)","She speaks French. (language)","We had lunch. (meal)"],
notes:[
"1. General uncountable nouns = NO article.",
"Water is essential. | Information is available. | Music is relaxing.",
"2. General plural nouns = NO article.",
"Dogs are loyal. | Children need care. | Books are useful.",
"3. Languages, meals, sports = NO article.",
"She speaks French. | We had breakfast. | He plays cricket.",
"4. Academic subjects = NO article.",
"Mathematics is tough. | She studies biology.",
"5. Abstract qualities in general = NO article.",
"Honesty is the best policy. | Freedom is important. | Love is powerful.",
"6. KEY TRAP: same noun can take THE or ZERO depending on specific vs general.",
"Water is essential. (general = zero) | THE water in this bottle is cold. (specific = the)",
"7. Common essay mistake: adding 'the' before general concepts.",
"WRONG: The education is important. | RIGHT: Education is important.",
"8. BUT use THE when the uncountable noun is made SPECIFIC by context.",
"THE information you gave me was wrong. | THE music at the party was loud."
],
trap:{w:"The water is essential for life.",r:"Water is essential for life.",y:"General truth about water = zero article. No 'the' needed."}}
}},
sva:{id:"sva",title:"Subject-Verb Agreement",icon:"\uD83D\uDD17",desc:"Singular/plural matching, tricky subjects",subs:{
"s-core":{title:"Core SVA Rules",rule:"SVA only applies in present tense. Find the acting noun (true subject), ignore prepositional phrases between subject and verb.",pos:"Singular subject = verb+s. Plural subject = base verb.",
exs:["The quality of products HAS improved. (quality=subject, not products)","The bouquet of roses SMELLS good. (bouquet=subject)","The results of the study SUPPORT this conclusion. (results=subject)"],
notes:[
"1. Singular subject = singular verb (adds s/es).",
"She works every day. | The team is winning.",
"2. Plural subject = plural verb (no s).",
"They work hard. | The results show improvement.",
"3. Subjects joined by AND = always plural.",
"Tom and Jerry ARE funny. | Rice and curry ARE ready.",
"4. Ignore prepositional phrases between subject and verb.",
"The list OF items IS long. | The box OF chocolates WAS delivered.",
"5. Collective nouns (team, group, family, committee, audience, jury, staff) = usually singular.",
"The team IS playing well. | The committee HAS decided.",
"6. The number of = singular. A number of = plural.",
"The number of students IS increasing. | A number of students ARE absent.",
"7. Uncountable nouns = always singular.",
"News IS on at 6 PM. | Information IS available. | Furniture IS expensive.",
"8. Time, money, distance as one unit = singular.",
"Ten dollars IS enough. | Five miles IS a long walk.",
"9. Titles of books/movies = singular.",
"The Avengers IS a great movie. | Harry Potter IS popular.",
"10. Gerund (-ing form) as subject = always singular.",
"Swimming IS good exercise. | Playing games REQUIRES concentration."
],
trap:{w:"The group of students were late.",r:"The group of students was late.",y:"Group = subject (singular collective noun). Ignore 'of students'."}},

"s-tricky":{title:"Neither/Nor, Each, Every, Indefinite Pronouns",rule:"Either/or and neither/nor = verb matches the NEAREST subject. Each, every, everyone, someone, nobody = always singular.",pos:"Neither A nor B = verb agrees with B (nearest).",
exs:["Neither the cat nor the dogs ARE outside. (dogs=nearest=plural)","Either the boys or the teacher IS late. (teacher=nearest=singular)","Each of the students HAS a textbook.","Everyone WANTS success."],
notes:[
"1. Either...or / Neither...nor = verb matches NEAREST subject.",
"Neither the teacher nor the students WERE present.",
"Either the students or the teacher IS responsible.",
"2. Each, every, everyone, everybody, someone, nobody = ALWAYS singular.",
"Each of us MUST try. | Every student HAS a book.",
"Everyone KNOWS the answer. | Nobody WAS home.",
"3. Indefinite pronouns: someone, anybody, nothing, everything = singular.",
"Something IS wrong. | Anything IS possible.",
"Nothing WAS left. | Everything LOOKS great.",
"4. Some, all, most, none = depends on the noun after OF.",
"Some of the water IS gone. (uncountable=singular)",
"Some of the books ARE missing. (countable=plural)",
"5. Percent/fraction = depends on noun after OF.",
"50% of the cake IS gone. | 50% of the apples ARE gone.",
"6. Determiner-noun agreement: this/that = singular noun. these/those = plural noun.",
"This TYPE of recipe. (not types) | These TYPES of recipes. (not type)",
"That KIND of food. | Those IDEAS are interesting.",
"7. Many/few/several = always followed by plural nouns.",
"Many REASONS exist. | Few STUDENTS passed. | Several ISSUES arose."
],
trap:{w:"Each of the boys have finished.",r:"Each of the boys has finished.",y:"Each = always singular, regardless of 'of the boys'."}},

"s-there":{title:"There is/are + Auxiliary Verb Rule",rule:"With there/here, verb agrees with the REAL subject that follows. When auxiliary verb (do/does/did/will/can) is present, main verb stays base form.",pos:"There is + singular. There are + plural. Does + base verb.",
exs:["There ARE several reasons for this. (reasons=plural)","Here IS the document. (document=singular)","The policy DOES NOT require approval. (does=singular, require=base)"],
notes:[
"1. There/Here = verb agrees with the REAL subject after it.",
"There IS a book on the table. | There ARE books on the table.",
"Here IS the report. | Here ARE the documents.",
"2. The real subject comes AFTER the verb in there/here sentences.",
"There WAS a problem. (problem=singular=was)",
"There WERE many problems. (problems=plural=were)",
"3. Auxiliary verb rule: when do/does/did is present, main verb = BASE form.",
"She DOES NOT like coffee. (not 'likes')",
"Why DOES the population matter? (not 'matters')",
"He DID NOT go home. (not 'went')",
"4. When NO auxiliary, main verb carries the agreement.",
"She LIKES coffee. | The population MATTERS.",
"5. After modals (can, will, must, should, may, might, could, would) = always base verb.",
"She CAN speak French. (not 'speaks')",
"He MUST complete it. (not 'completes')",
"Students SHOULD study harder. (not 'studies')",
"6. Only ONE verb in a clause carries the grammar. The rest stay base.",
"Does he GO? (not 'goes') | Will she COME? (not 'comes')"
],
trap:{w:"There is many problems with this approach.",r:"There are many problems with this approach.",y:"Problems = plural = are. Find the real subject after there/here."}}
}},
preps:{id:"preps",title:"Prepositions",icon:"\uD83C\uDFF7\uFE0F",desc:"Fixed pairs, gerund after prep, time/place",subs:{
"p-ger":{title:"Preposition + Gerund (-ing)",rule:"After ANY preposition, the verb takes -ing form (gerund). This includes 'to' when it is a preposition (not infinitive marker). The 'by + gerund' structure explains HOW something is done.",pos:"prep + V-ing. by + V-ing = method. to + V-ing (when to = preposition).",
exs:["Thanks for helping.","I look forward to meeting you. (to = preposition)","She succeeded by predicting market trends. (by + gerund = method)"],
notes:[
"1. After ALL prepositions = verb takes -ing form (gerund).",
"Without SACRIFICING quality. | After ANALYZING the data. | Before LEAVING.",
"2. Common prepositions that take gerund: for, about, of, in, on, at, by, without, after, before.",
"Thanks FOR helping. | She is passionate ABOUT learning. | Instead OF waiting.",
"3. BY + gerund = explains HOW something is done (method/means).",
"She improved BY practicing daily. | He succeeded BY predicting trends.",
"4. TO as preposition (NOT infinitive) = takes gerund. This is a major PTE trap.",
"I look forward TO MEETING you. (not 'to meet') | She is committed TO REDUCING costs. (not 'to reduce')",
"5. How to tell: if you can replace 'to' with 'about/for', it is a preposition = gerund.",
"I look forward TO meeting. = I look forward ABOUT meeting? Makes sense = preposition = gerund.",
"6. Common 'to + gerund' phrases to memorize:",
"look forward to, committed to, dedicated to, accustomed to, in addition to, object to, confess to.",
"7. After a comma with 'while/after/before/by', gerund often follows.",
"While REVIEWING the data, she found errors. | After COMPLETING the course, he got a job."
],
trap:{w:"I look forward to meet you.",r:"I look forward to meeting you.",y:"'To' here is a preposition, not infinitive marker. Preposition = gerund."}},

"p-fix":{title:"Fixed Verb/Adj + Preposition Pairs",rule:"Certain verbs and adjectives ALWAYS take specific prepositions. These are collocations that must be memorized. Using the wrong preposition is a common PTE trap.",pos:"depend ON, consist OF, interested IN, responsible FOR, result IN/FROM.",
exs:["Success depends on preparation.","She is interested in learning.","The report consists of three sections."],
notes:[
"1. Verb + Preposition pairs (most common in PTE):",
"depend ON | consist OF | result IN (=cause) | result FROM (=caused by) | focus ON | comply WITH",
"2. More verb + preposition pairs:",
"succeed IN | believe IN | invest IN | participate IN | contribute TO | respond TO | refer TO | lead TO",
"3. Adjective + Preposition pairs:",
"interested IN | responsible FOR | capable OF | aware OF | proud OF | fond OF",
"4. More adjective + preposition pairs:",
"committed TO | dedicated TO | accustomed TO | satisfied WITH | familiar WITH | concerned ABOUT",
"5. Confusing pair: result IN vs result FROM.",
"The policy RESULTED IN savings. (policy caused savings) | Success RESULTED FROM hard work. (hard work caused success)",
"6. Confusing pair: differ FROM vs different FROM.",
"The findings DIFFER FROM previous studies. | This is DIFFERENT FROM what we expected.",
"7. Across vs Through vs Inside vs Within.",
"ACROSS the bridge (over surface). THROUGH the tunnel (inside). INSIDE the box (physical). WITHIN 48 hours (time/limits).",
"8. Of vs From: Of = belonging/part. From = origin/source.",
"A friend OF mine. (belonging) | A message FROM my friend. (source)"
],
trap:{w:"She is responsible of the project.",r:"She is responsible for the project.",y:"Responsible FOR is the correct pair. Not 'of'."}},

"p-time":{title:"Time & Place Prepositions",rule:"AT = specific time/point. ON = days/dates/specific occasions. IN = months, years, seasons, longer periods, parts of day. ON = specific date even with part of day.",pos:"AT 5 PM. ON Monday. ON Friday morning. IN July. IN 2020. IN the morning.",
exs:["The meeting is at 3 PM on Friday.","She was born in 1995.","The report was submitted on Friday at 5 PM."],
notes:[
"1. AT = specific TIME or specific POINT.",
"AT 5 PM. AT noon. AT midnight. AT night. AT the weekend (British).",
"2. ON = DAYS, DATES, specific occasions.",
"ON Monday. ON 25th December. ON my birthday. ON the weekend (American).",
"3. IN = MONTHS, YEARS, SEASONS, longer periods, parts of day.",
"IN July. IN 2020. IN summer. IN the morning. IN the afternoon. IN the evening.",
"4. Exception: ON + specific date overrides IN for parts of day.",
"ON the evening OF December 24th. (not 'in the evening of') | ON Friday morning.",
"5. AT NIGHT (no 'the'). But: IN THE morning/afternoon/evening (with 'the').",
"She works AT NIGHT. | He exercises IN THE morning.",
"6. No preposition before: this, last, next, every.",
"See you NEXT Monday. (not 'on next Monday') | I went LAST week. (not 'in last week')",
"7. Since = starting point. For = duration. By = deadline.",
"SINCE 2015 (starting point). FOR three years (how long). BY Friday (deadline).",
"8. During = throughout a period. While = conjunction with clause.",
"DURING the meeting. (+ noun) | WHILE we were meeting. (+ clause)"
],
trap:{w:"I will see you in Monday.",r:"I will see you on Monday.",y:"Days of the week = ON. Not 'in'."}}
}},
passive:{id:"passive",title:"Active & Passive Voice",icon:"\uD83D\uDD04",desc:"be + V3, passive across tenses",subs:{
"v-basic":{title:"Basic Passive: be + V3",rule:"Active = subject does action (S+V+O). Passive = subject receives action (O + be + V3 + by S). Use passive when doer is unknown, unimportant, or obvious.",pos:"Active: She writes the report. Passive: The report is written (by her).",
exs:["The report was submitted yesterday.","New policies are being implemented.","The window was broken last night. (doer unknown)"],
notes:[
"1. Active voice = subject DOES the action.",
"The teacher teaches the students. | She wrote the report.",
"2. Passive voice = subject RECEIVES the action.",
"The students are taught by the teacher. | The report was written.",
"3. Core passive formula: be (conjugated) + past participle (V3).",
"is done | was written | has been approved | will be completed",
"4. Trick to identify passive: add 'by someone' - if it makes sense, it is passive.",
"The window was broken (by someone). = Passive. | She broke the window. = Active.",
"5. Use passive when the doer is UNKNOWN.",
"A bank was robbed yesterday. (We do not know who.)",
"6. Use passive when the doer is UNIMPORTANT or OBVIOUS.",
"He was arrested last night. (Obviously by police.)",
"7. Use passive for formal/academic/objective writing.",
"The survey was conducted across 10 cities. | The data were analyzed carefully.",
"8. Not every sentence can be passive - there must be a subject AND an object.",
"She sleeps. = No object = cannot be made passive.",
"9. The main difference: is the noun DOING the action or RECEIVING it?",
"Active: The chef cooked the meal. | Passive: The meal was cooked by the chef."
],
trap:{w:"The building built in 1990.",r:"The building was built in 1990.",y:"Missing 'be' verb. Passive always needs be + V3."}},

"v-tense":{title:"Passive Across Tenses",rule:"Match the 'be' verb to the correct tense. Continuous tenses use 'being'. Perfect tenses use 'been'.",pos:"is+V3 (present) | was+V3 (past) | has been+V3 (PP) | will be+V3 (future)",
exs:["Data is collected monthly. (present passive)","Results have been published. (PP passive)","The bridge will be completed next year. (future passive)"],
notes:[
"1. Present Simple Passive: is / are + V3.",
"The report IS written. | Emails ARE sent daily.",
"2. Past Simple Passive: was / were + V3.",
"The report WAS written. | The lights WERE turned off.",
"3. Present Continuous Passive: is / are + BEING + V3.",
"The report IS BEING written right now. (Do not forget 'being'!)",
"4. Past Continuous Passive: was / were + BEING + V3.",
"The report WAS BEING written when I arrived.",
"5. Present Perfect Passive: has / have + BEEN + V3.",
"The report HAS BEEN written. | Results HAVE BEEN published.",
"6. Past Perfect Passive: had + BEEN + V3.",
"The report HAD BEEN written before the deadline. (earlier past event)",
"7. Future Simple Passive: will + be + V3.",
"The report WILL BE written tomorrow.",
"8. Future Perfect Passive: will + have + been + V3.",
"The report WILL HAVE BEEN written by Friday.",
"9. Key pattern: Continuous = use BEING. Perfect = use BEEN.",
"is BEING built (continuous) | has BEEN built (perfect)",
"10. Common PTE trap: using V2 instead of V3 after 'been'.",
"WRONG: has been wrote. | RIGHT: has been written. (wrote=V2, written=V3)"
],
trap:{w:"The report has been wrote by the team.",r:"The report has been written by the team.",y:"After 'been' always use V3. wrote=V2, written=V3."}},

"v-modal":{title:"Passive with Modals",rule:"Modal + be + V3 for present. Modal + have been + V3 for past. Never skip 'be' between modal and V3.",pos:"must be done | can be seen | should have been informed | could have been prevented",
exs:["The issue must be addressed immediately.","Errors could have been prevented with better oversight.","A podcast can be made with minimal resources."],
notes:[
"1. Present modal passive: modal + BE + V3.",
"It MUST BE finished. | This CAN BE solved. | It SHOULD BE reviewed.",
"2. Past modal passive: modal + HAVE BEEN + V3.",
"It SHOULD HAVE BEEN informed. | It COULD HAVE BEEN prevented.",
"3. Never skip 'be' - most common PTE trap.",
"WRONG: This can solved. | RIGHT: This can BE solved.",
"4. After is/was/are/were: V+ing = active continuous. V3(ed) = passive.",
"She IS writing. (active) | The report IS written. (passive)",
"5. After have/has been: V+ing = active continuous. V3(ed) = passive.",
"He HAS BEEN working. (active) | The report HAS BEEN completed. (passive)",
"6. After had been: V+ing = active continuous. V3(ed) = passive.",
"She HAD BEEN studying. (active) | The letter HAD BEEN sent. (passive)",
"7. After will be: V+ing = active continuous. V3 = passive.",
"He WILL BE flying. (active) | It WILL BE completed. (passive)",
"8. Quick check: if subject is DOING = active. If subject is RECEIVING = passive.",
"The chef is cooking. (active) | The meal is being cooked. (passive)"
],
trap:{w:"This problem can solved easily.",r:"This problem can be solved easily.",y:"Need 'be' between modal and V3. Never skip it."}}
}},
gerinf:{id:"gerinf",title:"Gerunds & Infinitives",icon:"\uD83D\uDD24",desc:"When to use -ing vs to + verb",subs:{
"g-after":{title:"Verbs + Gerund vs Infinitive",rule:"Some verbs ONLY take gerund (-ing). Some ONLY take infinitive (to + V). Using the wrong form is a guaranteed PTE trap. These must be memorized.",pos:"Gerund verbs: enjoy, avoid, suggest, consider, recommend, risk, keep, mind, finish. Infinitive verbs: want, decide, agree, plan, promise, refuse, hope, expect, offer, learn.",
exs:["She enjoys reading academic journals. (enjoy + gerund)","They decided to postpone the meeting. (decide + infinitive)","The committee recommended revising the policy. (recommend + gerund)"],
notes:[
"1. Verbs that ALWAYS take GERUND (-ing):",
"enjoy, avoid, suggest, recommend, consider, risk, keep, mind, finish, practice, deny, imagine, miss, postpone, delay.",
"2. Verbs that ALWAYS take INFINITIVE (to + V):",
"want, decide, agree, plan, promise, refuse, hope, expect, offer, learn, manage, afford, appear, seem, tend, fail.",
"3. Quick memory trick: if the verb is about DOING/EXPERIENCING = gerund.",
"I ENJOY swimming. | She AVOIDS eating junk food. | He KEEPS forgetting.",
"4. Quick memory trick: if the verb is about FUTURE INTENTION/DESIRE = infinitive.",
"I WANT to travel. | She DECIDED to leave. | They AGREED to help.",
"5. Common PTE traps with gerund verbs:",
"WRONG: He avoided to answer. | RIGHT: He avoided answering. WRONG: She suggested to revise. | RIGHT: She suggested revising.",
"6. Common PTE traps with infinitive verbs:",
"WRONG: They decided leaving. | RIGHT: They decided to leave. WRONG: She refused helping. | RIGHT: She refused to help.",
"7. Require/need can take BOTH but with different structures.",
"The company REQUIRES employees TO disclose. (require + object + infinitive) | The carpet NEEDS cleaning. (need + gerund = passive meaning)"
],
trap:{w:"He avoided to answer the question.",r:"He avoided answering the question.",y:"Avoid ALWAYS takes gerund. Never infinitive."}},

"g-meaning":{title:"Meaning Change: stop, remember, try, regret",rule:"Some verbs change meaning depending on gerund or infinitive. stop + gerund = quit the activity. stop + infinitive = pause to do something. remember + gerund = recall a past action. remember + infinitive = do not forget to do.",pos:"stop smoking (quit) vs stop to smoke (pause for one). remember locking (I recall) vs remember to lock (do not forget).",
exs:["She stopped smoking last year. (quit the habit)","She stopped to smoke on the way home. (paused in order to smoke)","I remember locking the door. (I have a memory of doing it)","Please remember to lock the door. (do not forget)"],
notes:[
"1. STOP + gerund = quit/cease the activity.",
"She STOPPED SMOKING. = She quit smoking.",
"2. STOP + infinitive = pause in order to do something else.",
"She STOPPED TO SMOKE. = She paused her walk to have a cigarette.",
"3. REMEMBER + gerund = recall a past action (you DID it, now you recall).",
"I REMEMBER LOCKING the door. = I have a memory of doing it.",
"4. REMEMBER + infinitive = do not forget to do (future obligation).",
"REMEMBER TO LOCK the door tonight. = Do not forget to do it.",
"5. TRY + infinitive = attempt to do something (effort).",
"He TRIED TO OPEN the window. = He attempted but it was stuck.",
"6. TRY + gerund = experiment with a different method.",
"He TRIED PUTTING oil on it. = He experimented with oil as a solution.",
"7. REGRET + gerund = regret a past action you DID.",
"I REGRET SAYING that. = I wish I had not said it.",
"8. REGRET + infinitive = feel sorry about what you are about to say (formal).",
"I REGRET TO INFORM you that your application was rejected."
],
trap:{w:"I remember to lock the door last night. (meaning: I recall doing it)",r:"I remember locking the door last night.",y:"Recall of past action = gerund. 'Remember to' = future obligation (do not forget)."}},

"g-prep":{title:"Preposition + Gerund in Context",rule:"After ALL prepositions, ALWAYS use gerund. This includes 'to' when it functions as a preposition. Common phrases: committed to, capable of, in addition to, interested in, look forward to, accustomed to, object to.",pos:"preposition + V-ing. Always. No exceptions.",
exs:["She is capable of managing large teams.","In addition to teaching, he conducts research.","He is committed to reducing emissions."],
notes:[
"1. After ANY preposition = ALWAYS gerund. No exceptions.",
"Without SACRIFICING. By PREDICTING. After ANALYZING. Before LEAVING. For HELPING.",
"2. 'To' as preposition (NOT infinitive marker) = gerund follows.",
"Committed TO REDUCING. Look forward TO MEETING. Accustomed TO WORKING. Object TO BEING.",
"3. How to identify: replace 'to' with 'about' or 'for'. If it still makes sense = preposition = gerund.",
"I look forward TO meeting. = I look forward ABOUT meeting? Sounds OK = preposition = gerund.",
"4. Full list of 'to + gerund' phrases (memorize these for PTE):",
"look forward to, committed to, dedicated to, accustomed to, in addition to, object to, confess to, resort to, contribute to.",
"5. 'By + gerund' = explains METHOD or MEANS (how something is done).",
"She improved BY PRACTICING daily. | He succeeded BY PREDICTING market trends.",
"6. 'About + gerund' = topic or concern.",
"She is passionate ABOUT LEARNING. | He is worried ABOUT LOSING his job.",
"7. 'For + gerund' = reason or purpose.",
"She apologized FOR BEING late. | Thank you FOR WAITING. | He was arrested FOR STEALING.",
"8. 'Of + gerund' = capability or quality.",
"She is capable OF MANAGING teams. | He is tired OF WAITING. | Instead OF COMPLAINING."
],
trap:{w:"He is committed to reduce emissions.",r:"He is committed to reducing emissions.",y:"'To' here is a preposition, not infinitive marker. All prepositions take gerund."}}
}},
cond:{id:"cond",title:"Conditionals",icon:"\uD83D\uDD00",desc:"Zero, first, second, third conditional",subs:{
"c-zero":{title:"Zero Conditional (Facts & General Truths)",rule:"If + present simple, present simple. Used for scientific facts, natural laws, and things that are ALWAYS true. Both clauses use present tense.",pos:"If + V1 (present), V1 (present). Both sides present simple.",
exs:["If you heat water to 100C, it boils.","If students study regularly, they perform better.","If iron is exposed to moisture, it rusts."],
notes:[
"1. Zero conditional = for facts and things that are ALWAYS true.",
"If you HEAT water, it BOILS. | If you MIX red and blue, you GET purple.",
"2. Both clauses use PRESENT SIMPLE. Never 'will' in zero conditional.",
"WRONG: If water is heated, it WILL boil. | RIGHT: If water is heated, it BOILS.",
"3. Use for scientific facts, natural laws, general truths.",
"If ice MELTS, it BECOMES water. | If pressure INCREASES, the boiling point RISES.",
"4. 'When' can often replace 'if' in zero conditional (same meaning).",
"WHEN you heat water, it boils. = IF you heat water, it boils.",
"5. Key difference from first conditional: zero = always true. First = possible future.",
"If you drop glass, it breaks. (zero = always) | If you drop that glass, it will break. (first = specific future)"
],
trap:{w:"If water is heated, it will boil.",r:"If water is heated, it boils.",y:"General scientific fact = zero conditional. Both clauses present tense. No 'will'."}},

"c-first":{title:"First Conditional (Real/Likely Future)",rule:"If + present simple, will + base verb. Used for real, possible, likely future situations. NEVER put 'will' in the if-clause.",pos:"If + V1 (present), will + V1 (base). Never: If + will.",
exs:["If it rains tomorrow, we will cancel the event.","If the economy improves, unemployment will decrease.","If the project stays on schedule, the team will receive a bonus."],
notes:[
"1. First conditional = REAL possibility in the FUTURE.",
"If it RAINS, we WILL cancel. | If she PASSES, she WILL graduate.",
"2. If-clause = PRESENT SIMPLE. Result clause = WILL + base verb.",
"If the economy IMPROVES, unemployment WILL decrease.",
"3. NEVER put 'will' after 'if'. This is the #1 PTE conditional trap.",
"WRONG: If it WILL rain, we will stay. | RIGHT: If it RAINS, we will stay.",
"4. Can use 'can/may/might/should' instead of 'will' in result clause.",
"If you study hard, you CAN pass. | If it rains, we MIGHT cancel.",
"5. Unless = if not. Same structure as first conditional.",
"UNLESS it rains, we will go. = IF it does NOT rain, we will go.",
"6. Key difference from zero: first = specific possible future. Zero = always true fact.",
"If you DROP that glass, it WILL break. (first = this specific glass) | If you DROP glass, it BREAKS. (zero = always)"
],
trap:{w:"If it will rain, we will stay inside.",r:"If it rains, we will stay inside.",y:"NEVER put 'will' in the if-clause. If-clause = present simple only."}},

"c-second":{title:"Second Conditional (Unreal/Hypothetical Present)",rule:"If + past simple, would + base verb. Used for imaginary, unlikely, or hypothetical present/future situations. Use 'were' for all subjects (not 'was'). NEVER put 'would' in the if-clause.",pos:"If + V2 (past), would + V1 (base). If I were... (not 'was').",
exs:["If I had more time, I would learn another language.","If she were the manager, she would change the policy.","If the government invested more, results would be dramatic."],
notes:[
"1. Second conditional = HYPOTHETICAL or UNLIKELY present/future.",
"If I HAD more time, I WOULD travel. (but I do not have time)",
"2. If-clause = PAST SIMPLE. Result = WOULD + base verb.",
"If she WERE the manager, she WOULD change things.",
"3. Use 'were' for ALL subjects (formal). 'Was' is informal but accepted.",
"If I WERE rich... | If he WERE here... | If she WERE the boss...",
"4. NEVER put 'would' in the if-clause. Major PTE trap.",
"WRONG: If I WOULD have time, I would travel. | RIGHT: If I HAD time, I would travel.",
"5. Can use 'could/might' instead of 'would' in result clause.",
"If the budget WERE sufficient, we COULD hire more staff.",
"6. Key difference from first: first = real possibility. Second = unlikely/imaginary.",
"If I WIN the lottery, I WILL buy a house. (first = possible) | If I WON the lottery, I WOULD buy a house. (second = unlikely)"
],
trap:{w:"If I would have more time, I would travel.",r:"If I had more time, I would travel.",y:"NEVER put 'would' in the if-clause. If-clause = past simple only."}},

"c-third":{title:"Third Conditional (Unreal Past)",rule:"If + had + V3, would have + V3. Used for imagining a DIFFERENT past. The situation did NOT happen. NEVER put 'would have' in the if-clause.",pos:"If + had + V3, would/could/might + have + V3.",
exs:["If they had invested earlier, they would have made a profit.","If she had studied harder, she could have passed.","If the warning had been issued earlier, damage would have been minimized."],
notes:[
"1. Third conditional = imagining a DIFFERENT past. It did NOT happen.",
"If they HAD INVESTED, they WOULD HAVE profited. (but they did not invest)",
"2. If-clause = HAD + V3 (past participle). Result = WOULD HAVE + V3.",
"If she HAD STUDIED harder, she WOULD HAVE passed.",
"3. NEVER put 'would have' in the if-clause. Biggest PTE trap.",
"WRONG: If they WOULD HAVE known, they would have acted. | RIGHT: If they HAD KNOWN, they would have acted.",
"4. Can use 'could have' or 'might have' instead of 'would have'.",
"If he HAD trained, he COULD HAVE won. | If we HAD left earlier, we MIGHT HAVE arrived on time.",
"5. Third conditional is often combined with passive voice in PTE.",
"If measures HAD BEEN taken, the damage COULD HAVE BEEN prevented.",
"6. Key difference: second = unreal NOW. Third = unreal PAST.",
"If I HAD money, I WOULD buy it. (second = I do not have money now) | If I HAD HAD money, I WOULD HAVE bought it. (third = I did not have money then)"
],
trap:{w:"If they would have known, they would have acted differently.",r:"If they had known, they would have acted differently.",y:"NEVER 'would have' in the if-clause. Always 'had + V3' after 'if' in third conditional."}}
}},
ptegrammar:{id:"ptegrammar",title:"PTE Grammar Traps 🆕",icon:"🎯",desc:"Your personal mistake patterns — What/Which/Where/Whether, Parallel Structure, Word Type in Lists, Real vs Hypothetical",subs:{

"pg-whatwhich":{title:"What vs Which vs Where vs Whether 🆕",rule:"WHAT = open unknown thing. WHICH = picking from a known list. WHERE = refers to a place. WHETHER = yes/no uncertainty, always pairs with OR.",pos:"'the thing(s) that' = WHAT | 'picking from a list' = WHICH | 'in that place' = WHERE | 'X or Y uncertainty' = WHETHER",
exs:["Compared to WHAT a family buys. (open unknown)","The book WHICH I read last week. (known thing)","The lab WHERE experiments were done. (place)","The question WHETHER it works OR not. (yes/no)"],
notes:[
"YOUR MISTAKE PATTERN",
"You have made this mistake multiple times. You confuse WHICH with WHAT and WHERE.",
"RULE 1: WHAT = open unknown thing",
"Use WHAT when you cannot replace with 'which specific one'.",
"Compared to WHAT a family buys = compared to whatever things they buy (open, no list).",
"SWAP TEST: Replace blank with 'the thing(s) that' — if it fits → WHAT.",
"'compared to THE THINGS THAT a family buys' ✓ → use WHAT.",
"RULE 2: WHICH = picking from a known or implied list",
"The report WHICH she submitted. (we know there is a specific report)",
"WHICH implies a definite reference — you know what the thing is.",
"RULE 3: WHERE = refers back to a physical place or location",
"The lab WHERE experiments were conducted. (lab = a place)",
"SWAP TEST: Can you replace blank with 'in that place'? YES → WHERE.",
"WARNING: Even if a thing physically exists somewhere, if the blank points to the THING not the LOCATION, use WHICH.",
"The ruins WHICH archaeologists discovered (ruins = the THING discovered, not where they went).",
"The site WHERE they excavated (site = the PLACE of excavation).",
"RULE 4: WHETHER = yes/no uncertainty, ALWAYS has OR nearby",
"The question WHETHER X or Y remains debated.",
"Fixed phrase: the question AS TO WHETHER = standard academic English.",
"SPOT THE OR: whenever you see ___ X OR Y in a sentence → WHETHER every time.",
"COMMON PTE MISTAKE",
"Choosing WHERE when the blank refers to a THING not a LOCATION.",
"The ruins WHICH archaeologists discovered — ruins are the THING discovered, not a place you go.",
"Ask: is the blank pointing to a THING or a PLACE? → THING = WHICH, PLACE = WHERE."
],
trap:{w:"The ruins where archaeologists discovered in 1923.",r:"The ruins which archaeologists discovered in 1923.",y:"Ruins = a thing that was discovered, not a location where something happened. Use WHICH for things."}},

"pg-parallel":{title:"AND / OR Parallel Structure 🆕",rule:"Both sides of AND / OR must match in FORM and logical PURPOSE. Find the word AFTER and/or first → match your blank to that exact form.",pos:"X and Y must match: -ING and -ING | TO and TO | V1 and V1 | noun and noun",
exs:["examining AND testing (-ING + -ING) ✓","to reduce AND to promote (TO + TO) ✓","self-reported OR demonstrated (same logical purpose) ✓","to examine AND testing ✗ — mixed forms"],
notes:[
"YOUR MISTAKE PATTERN",
"You chose 'to examine' when the answer was 'examining' because 'testing' after AND was -ING.",
"You chose 'experimented' when the answer was 'demonstrated' — same logical purpose broken.",
"THE MIRROR RULE",
"AND and OR act like a mirror. Both sides must reflect each other.",
"STEP 1: Find the word AFTER and/or first.",
"STEP 2: What form is it? (-ING / TO / base verb / noun?)",
"STEP 3: Match your blank to that SAME form.",
"FORM MATCHING EXAMPLES",
"'collecting data AND ___ findings' → collecting = -ING → answer: analysing (-ING)",
"'to reduce emissions AND ___ energy' → to reduce = TO → answer: to promote (TO)",
"'either self-reported OR ___' → self-reported = verb showing a result → answer: demonstrated (same purpose)",
"LOGICAL PURPOSE MATCHING",
"For EITHER/OR: both sides must serve the same logical purpose, not just the same form.",
"'either self-reported OR demonstrated' — both = ways of SHOWING anxiety. ✓",
"'either self-reported OR experimented' — showing vs exploring = BROKEN purpose. ✗",
"THE OR VERSION",
"Either X or Y works exactly the same as X and Y — both sides must match.",
"QUICK DRILL: Before choosing, always find the word AFTER and/or and ask 'what form is this?'."
],
trap:{w:"Contemporary research continues to examine and testing the ordering.",r:"Contemporary research continues examining and testing the ordering.",y:"'testing' after AND is -ING, so the blank must also be -ING: examining. Mirror rule."}},

"pg-wordtype":{title:"Word TYPE in Lists 🆕",rule:"When a blank sits inside a list, identify the word TYPE of all other list items. All items must be the same type — noun / adjective / -ING verb. Match your blank exactly.",pos:"noun list → noun | adjective list → adjective | -ING list → -ING",
exs:["visible brush strokes, light colors, open composition, EMPHASIS on light (all nouns) ✓","increasing, evaluating, recruiting (-ING list) ✓","emphasized ✗ — verb in a noun list"],
notes:[
"YOUR MISTAKE PATTERN",
"You chose 'emphasized' (verb) when the answer was 'emphasis' (noun) because the blank was in a noun list.",
"THE LIST RULE",
"A list in English must be grammatically consistent — all items must be the same word type.",
"HOW TO SPOT A LIST",
"Look for commas separating multiple items before the blank.",
"'include X, Y, ___, Z' = you are inside a list → check what X, Y, Z are.",
"STEP 1: Are there other items in the list? Find them.",
"STEP 2: What word TYPE are they? (noun / adjective / -ING verb?)",
"STEP 3: Your blank MUST be the same type.",
"NOUN LIST EXAMPLE",
"'characteristics include: brushstrokes, colors, composition, ___, subject matter'",
"All = nouns → blank = 'emphasis' (noun) NOT 'emphasized' (verb) ✗",
"ADJECTIVE LIST EXAMPLE",
"'The painting was vibrant, dynamic, and ___'",
"All = adjectives → blank must be an adjective too.",
"-ING LIST EXAMPLE",
"'The programme aims to: providing mentorship, offering scholarships, ___ guidance'",
"All = -ING → blank = 'providing' (-ING) NOT 'provision' (noun) ✗",
"WORD FAMILY TRAP",
"PTE often gives you the same root word in different forms: emphasis / emphasized / emphasizing / emphatic.",
"The meaning is right for all — only the FORM matters. Always check the list first.",
"QUICK TEST: Replace your answer with another list item. Does it sit naturally in the same position? YES = correct type."
],
trap:{w:"Characteristics include brushstrokes, light colors, open composition, emphasized on light.",r:"Characteristics include brushstrokes, light colors, open composition, emphasis on light.",y:"The list contains nouns. 'emphasized' is a verb. Match the word TYPE of the other list items → emphasis (noun)."}},

"pg-hypothetical":{title:"Real vs Hypothetical — Would Be 🆕",rule:"WOULD BE = imaginary / conditional / hypothetical world. IS / WAS = real world happening now or in the past. The fixed phrase 'more/less than WOULD BE expected' appears constantly in PTE.",pos:"Real → IS / WAS | Imaginary → WOULD BE | Comparing to prediction → WOULD BE expected",
exs:["The drug reduced symptoms more than WOULD BE expected. (hypothetical comparison)","If it were approved, it WOULD BE effective. (conditional)","The result WAS surprising. (real past event)"],
notes:[
"YOUR MISTAKE PATTERN",
"You chose 'being' when the answer was 'would be' in: 'more than ___ expected from their weight-loss effects'.",
"THE TWO DOORS",
"Every blank with be-verbs is behind one of two doors:",
"Door 1 — REAL WORLD → use IS / WAS / WERE",
"Door 2 — IMAGINARY WORLD → use WOULD BE",
"WORLD 1: Real — happening now or in the past",
"The drug IS effective. (real fact) | The results WERE surprising. (real past event)",
"WORLD 2: Hypothetical — imagined, predicted, or conditional",
"The drug WOULD BE effective if approved. (not yet approved = imaginary)",
"WORLD 3: Comparison to a prediction (YOUR SPECIFIC TRAP)",
"'more than WOULD BE expected' = more than what you would normally predict",
"This is a FIXED ACADEMIC PHRASE in PTE. Learn it as one unit:",
"MORE / LESS THAN WOULD BE EXPECTED = always this phrase. No exceptions.",
"BEING vs WOULD BE",
"'Being expected' = something being expected right now (present passive continuous).",
"'Would be expected' = what is normally anticipated in a hypothetical/general sense.",
"QUICK TEST: Is the sentence comparing reality to a prediction or imagination?",
"YES → WOULD BE | NO (real event) → WAS / IS",
"MORE PTE PHRASES WITH WOULD BE",
"'more than would be expected' | 'less than would be anticipated' | 'greater than would be typical'",
"All follow the same pattern: comparing real outcome to an imagined baseline."
],
trap:{w:"The drug reduced heart attacks more than being expected from weight-loss alone.",r:"The drug reduced heart attacks more than would be expected from weight-loss alone.",y:"Comparing real result to an imagined prediction = hypothetical world = WOULD BE. Not 'being'."}},

"pg-othertheir":{title:"OTHER vs THEIR 🆕",rule:"OTHER = different or separate entities. THEIR = belonging to them (possessive). Never confuse ownership with difference.",pos:"Different/separate ones → OTHER | Belongs to them → THEIR",
exs:["Some countries refuse to recognise OTHER countries. (different/separate)","The team submitted THEIR findings. (belonging to the team)","While some use one method, OTHERS use different approaches. (separate entities)"],
notes:[
"YOUR MISTAKE PATTERN",
"You chose 'their' when the answer was 'other' in: 'countries find it convenient to not recognise ___ countries'.",
"THE CORE DIFFERENCE",
"THEIR = possession. Something BELONGS to them.",
"OTHER = difference. Something is SEPARATE or DIFFERENT from them.",
"OWNERSHIP TEST",
"Ask: does the blank mean 'belonging to them'?",
"YES → THEIR | NO → OTHER",
"'countries refuse to recognise ___ countries'",
"= they are not recognising DIFFERENT/SEPARATE countries (not their own) → OTHER",
"'the team submitted ___ report'",
"= the report BELONGS TO the team → THEIR",
"THE OTHERS / ANOTHER / OTHER",
"OTHER + noun (singular or plural): other countries, other options",
"OTHERS = pronoun (replaces noun): Some use method A, others use method B.",
"ANOTHER = one more: She wrote another report.",
"THEIR + noun = possession: their findings, their policy, their team",
"COMMON PTE SENTENCE PATTERNS",
"'some X... other X' = comparing different groups → OTHER",
"'the team/group/organisation... ___ work' = belonging → THEIR",
"'while some... ___ organisations' = different ones → OTHER"
],
trap:{w:"Some countries find it convenient to not recognise their countries.",r:"Some countries find it convenient to not recognise other countries.",y:"'Their countries' would mean countries belonging to them — their own countries. The meaning is 'different/separate countries' = OTHER."}}

}},
connectors:{id:"connectors",title:"Connectors 🆕",icon:"🔗",desc:"However, Despite, Moreover, Therefore — linking ideas correctly in PTE",subs:{

"cn-contrast":{title:"Contrast Connectors 🆕",rule:"Contrast connectors show that two ideas are different or opposite. Key differences: However/Nevertheless/Nonetheless START NEW SENTENCES. Although/Though/Even though START SUBORDINATE CLAUSES. Despite/In spite of are followed by NOUNS or GERUNDS, never full clauses. Whereas compares two subjects side by side. On the contrary directly NEGATES what was said.",pos:"However = start new sentence + comma | Although = start subordinate clause | Despite = before noun/gerund | Whereas = mid-sentence contrast | On the contrary = direct negation",
exs:["The project was well-funded. However, it failed to meet its targets.","Although it was raining, they continued the match.","Despite the heavy rain, the event was a success.","Urban areas are densely populated, whereas rural areas have more space.","He is not lazy. On the contrary, he works harder than anyone.","The results were disappointing. Nevertheless, the team remained motivated."],
notes:[
"CONTRAST CONNECTORS — THE FULL FAMILY",
"There are 6 main contrast connectors you must know for PTE. Each has its own grammar rules.",
"",
"1. HOWEVER — The most common contrast connector",
"Meaning: introduces a contrasting point that opposes what came before.",
"Position: Start of new sentence OR after semicolon. ALWAYS followed by comma.",
"Example: The drug showed promising results. However, significant side effects were reported.",
"Similar: Nevertheless, Nonetheless, On the other hand.",
"'However' is neutral. 'Nevertheless/Nonetheless' are more formal and emphasise persistence.",
"",
"2. ALTHOUGH — Starts a subordinate clause",
"Meaning: introduces a clause that contrasts with the main clause.",
"Position: Start or middle of sentence. No comma after the word itself — comma separates CLAUSES.",
"Example: Although the evidence was compelling, the jury remained divided.",
"CRITICAL: Although + FULL CLAUSE. 'Although it rained' NOT 'Although the rain'.",
"Similar: Though (less formal), Even though (adds emphasis), While (can also mean 'during').",
"",
"3. DESPITE — Before noun or gerund ONLY",
"Meaning: shows contrast by acknowledging a surprising fact.",
"Position: Before noun/pronoun/gerund. NEVER before a full clause.",
"Example: Despite widespread opposition, the government pushed ahead.",
"CRITICAL: Despite + NOUN/GERUND. 'Despite the rain' NOT 'Despite it rained'.",
"Similar: In spite of (identical), Regardless of, Notwithstanding (very formal).",
"",
"4. NEVERTHELESS — Formal 'even so'",
"Meaning: in spite of that. Shows second point is true even though the first suggests otherwise.",
"Position: Start of new sentence + comma. More formal than However.",
